<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="style.css">

</head>
<body>
<div id="header">
  <div class="logo" onclick="goHome()">
    <img class="logo-img" src="docs/assets/brand/autoskan-logo-transparent.png" alt="Автоскан">
    <div class="logo-text">
      <span id="site-name">База знаний</span>
      <span class="logo-sub">Автоскан</span>
    </div>
  </div>
  <div id="h-space"></div>
  <button id="burger" onclick="toggleSidebar()" aria-label="Menu"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
  <button class="bar-btn" id="btn-test" title="Тестирование">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>
    <span>Тестирование</span>
  </button>
  <div id="search-box" onclick="openSearch()">

    <span id="lbl-search">Search...</span><span class="kbd">⌘K</span>

  <a id="actions-status" title="GitHub Actions status" target="_blank" style="display:none;align-items:center;gap:5px;font-size:11px;padding:4px 8px;border:0.5px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text2);text-decoration:none;cursor:pointer"></a>
  <div id="role-badge" style="display:none;align-items:center;gap:5px;font-size:12px;padding:3px 6px 3px 8px;border:0.5px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text2)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span id="role-name"></span><button onclick="logoutRole()" title="Выйти" style="background:none;border:none;cursor:pointer;padding:0;color:var(--text3);font-size:14px;line-height:1;margin-left:3px;display:flex;align-items:center">✕</button></div>
  <button id="btn-settings" onclick="openSettings()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
  </button>
</div>
<div id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div id="layout">
  <div id="sidebar">
    <div id="sidebar-top">
      <button id="btn-new" onclick="openNewPage()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span id="lbl-new-page">New page</span>
      </button>
    </div>
    <div id="tree"></div>
    <div id="sidebar-quick">
      <div class="sidebar-label">БЫСТРЫЙ ДОСТУП</div>
      <div class="quick-item" onclick="openFavoritesView()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span>Избранное</span>
        <span id="fav-count" class="quick-badge" style="display:none">0</span>
      </div>
      <div class="quick-item" onclick="openRecentView()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>Недавние</span>
      </div>
      <a class="quick-item" href="https://docs.google.com/spreadsheets/d/14AHFR4iF3fzVtlW5v57DtNLadojGM-os4wGasmk6QN8" target="_blank" rel="noopener noreferrer">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        <span>Контакты</span>
      </a>
      <div class="quick-item" onclick="openLinksPage()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
        <span>Ссылки</span>
      </div>
    </div>
    <div id="sidebar-suggest">
      <div class="suggest-text">Не нашли нужное?</div>
      <button class="suggest-btn" onclick="toast('Функция обращения появится в следующем обновлении')">Предложить статью</button>
    </div>
  </div>
  <div id="content">
    <div id="content-bar">
      <div class="breadcrumb" id="breadcrumb"></div>
      <div id="cb-space"></div>
      <button class="bar-btn" id="btn-delete" onclick="deletePage()" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
        <span id="lbl-delete">Delete</span>
      </button>
      <button class="bar-btn" id="btn-rename" onclick="openRenamePage()" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
        <span id="lbl-rename">Rename</span>
      </button>
      <button class="bar-btn" id="btn-history" onclick="openHistory()" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span id="lbl-history">History</span>
      </button>
      <button class="bar-btn" id="btn-visibility" onclick="openPageVisibility()" style="display:none" title="Видимость страницы">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
      <button class="bar-btn" id="btn-editors" onclick="openPageEditors()" style="display:none" title="Редакторы страницы">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      </button>
      <button class="bar-btn" id="btn-fav" onclick="toggleFavorite()" style="display:none" title="Добавить в избранное">
        <svg id="btn-fav-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </button>
      <button class="bar-btn" id="btn-share" onclick="sharePage()" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        <span id="lbl-share">Share</span>
      </button>
      <button class="bar-btn" id="btn-print" onclick="window.print()" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        <span id="lbl-print">Print</span>
      </button>
      <button class="bar-btn" id="btn-edit" onclick="startEdit()" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        <span id="lbl-edit">Edit</span>
      </button>
      <div class="edit-btns" id="edit-btns">
        <button class="bar-btn" id="btn-cancel" onclick="cancelEdit()"><span id="lbl-cancel">Cancel</span></button>
        <button class="bar-btn" id="btn-save" onclick="savePage()">
          <span id="save-spin" style="display:none" class="spin"></span>
          <span id="lbl-save">Save</span>
        </button>
      </div>
    </div>
    <div id="panels">
      <div id="empty">
        <div id="empty-placeholder" style="display:flex;flex-direction:column;align-items:center;gap:10px">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span id="lbl-empty">Select a page or create a new one</span>
        </div>
        <div id="recent-wrap" style="display:none"></div>
      </div>
      <div id="view-wrap" style="display:none"><div id="view"></div></div>
      <div id="editor-wrap">
        <div id="md-toolbar">
          <!-- Text formatting -->
          <button class="tb-btn" title="Bold" onclick="fmt('**','**','bold text')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 4h8a4 4 0 010 8H6z"/><path d="M6 12h9a4 4 0 010 8H6z"/></svg></button>
          <button class="tb-btn" title="Italic" onclick="fmt('_','_','italic text')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg></button>
          <button class="tb-btn" title="Strikethrough" onclick="fmt('~~','~~','strikethrough')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4H9a3 3 0 00-2.83 4"/><path d="M14 12a4 4 0 010 8H6"/><line x1="4" y1="12" x2="20" y2="12"/></svg></button>
          <div class="tb-sep"></div>
          <!-- Headings -->
          <button class="tb-btn" title="Heading 1" onclick="fmtLine('# ')">H1</button>
          <button class="tb-btn" title="Heading 2" onclick="fmtLine('## ')">H2</button>
          <button class="tb-btn" title="Heading 3" onclick="fmtLine('### ')">H3</button>
          <div class="tb-sep"></div>
          <!-- Blocks & lists -->
          <button class="tb-btn" title="Blockquote" onclick="fmtLine('> ')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="2" height="16" rx="1" fill="currentColor" stroke="none"/><line x1="9" y1="8" x2="20" y2="8"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="16" x2="20" y2="16"/></svg></button>
          <button class="tb-btn" title="Unordered list" onclick="fmtLine('- ')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/></svg></button>
          <button class="tb-btn" title="Ordered list" onclick="fmtLine('1. ')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4M4 10h2" stroke-linecap="round"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1" stroke-linecap="round"/></svg></button>
          <button class="tb-btn" title="Task list" onclick="fmtLine('- [ ] ')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="13" height="13" rx="2"/><path d="M6 11l3 3 5-5"/><line x1="19" y1="9" x2="21" y2="9"/><line x1="19" y1="14" x2="21" y2="14"/><line x1="19" y1="19" x2="21" y2="19"/></svg></button>
          <div class="tb-sep"></div>
          <!-- Code -->
          <button class="tb-btn" title="Inline code" onclick="fmt('`','`','code')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></button>
          <button class="tb-btn" title="Code block" onclick="fmt('\n```\n','\n```\n','code here')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="10 9 7 12 10 15"/><polyline points="14 9 17 12 14 15"/></svg></button>
          <div class="tb-sep"></div>
          <!-- Insert -->
          <button class="tb-btn" title="Link" onclick="fmt('[','](url)','link text')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg></button>
          <button class="tb-btn" title="Image" onclick="fmt('![','](url)','alt text')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></button>
          <button class="tb-btn" title="Table" onclick="fmtTable()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="12" y1="3" x2="12" y2="21"/></svg></button>
          <button class="tb-btn" title="Horizontal rule" onclick="fmt('\n---\n','','')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/></svg></button>
        </div>
        <div id="draft-banner">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="draft-banner-msg">You have an unsaved draft.</span>
          <button class="draft-banner-btn" onclick="restoreDraft()" id="btn-draft-restore">Restore draft</button>
          <button class="draft-banner-btn" onclick="discardDraft()" id="btn-draft-discard">Discard</button>
        </div>
        <textarea id="editor" spellcheck="false"></textarea>
      </div>
      <div id="toc"><div class="toc-title" id="lbl-toc">On this page</div><div id="toc-list"></div></div>
    </div>
  </div>
</div>
<div id="search-overlay" onclick="if(event.target===this)closeSearch()">
  <div id="search-panel">
    <div id="search-input-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search-q" autocomplete="off" oninput="runSearch(this.value)" onkeydown="searchKey(event)">
    </div>
    <div id="search-results"></div>
  </div>
</div>
<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal"><h3 id="modal-title"></h3><div id="modal-body"></div><div class="modal-actions" id="modal-actions"></div></div>
</div>
<div id="role-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;align-items:center;justify-content:center">
  <div style="background:var(--bg);border:0.5px solid var(--border);border-radius:12px;padding:32px 28px;width:340px;box-shadow:0 12px 36px rgba(0,0,0,.2)">
    <div style="font-weight:600;font-size:16px;margin-bottom:6px;color:var(--text)">Автоскан — База знаний</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:20px">Введите пароль для доступа к базе знаний</div>
    <input type="password" id="role-pw-input" style="width:100%;box-sizing:border-box;padding:8px 10px;border:0.5px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text);font-size:13px;outline:none" placeholder="Пароль" onkeydown="if(event.key==='Enter')submitRoleLogin()">
    <div id="role-pw-error" style="display:none;color:#cf222e;font-size:12px;margin-top:6px"></div>
    <div style="margin-top:16px;display:flex;justify-content:flex-end">
      <button class="btn-primary" onclick="submitRoleLogin()">Войти</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
const $=id=>document.getElementById(id);

// ── Config & i18n ──
let cfg={},i18n={};

// ── Page tree ──
let tree=[];

// ── Navigation state ──
let currentPath=null,currentSha=null;

// ── Editor state ──
let editorDirty=false,originalContent=null,dragDropInit=false;

// ── Auth state ──

// ── Role system ──
let roles=[],currentRole=null,_ownerPw=null;

// ── Sections config ──
const SECTIONS=[
  {slug:'company',       name:'Компания',              folder:'company',           color:'#3B82F6', icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>'},
  {slug:'products',      name:'Продукты',              folder:'products',          color:'#8B5CF6', icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>'},

const wikiLinkExtension={
  name:'wikilink',
  level:'inline',
  start(src){return src.indexOf('[[');},
  tokenizer(src){
    const match=src.match(/^\[\[([^\]]+)\]\]/);
    if(match) return{type:'wikilink',raw:match[0],text:match[1].trim()};
  },
  renderer(token){
    const page=tree.find(p=>
      p.title.toLowerCase()===token.text.toLowerCase()||
      p.path.toLowerCase()===token.text.toLowerCase()
    );
    if(page){
      const data=JSON.stringify(page).replace(/"/g,'&quot;');
      return`<a href="#" class="wiki-link" onclick="openPage(${data});return false">${escHtml(token.text)}</a>`;
    }
    return`<span class="wiki-link broken" title="Page not found">${escHtml(token.text)}</span>`;
  }
};

// ── Helpers ──
function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function relativeDate(iso){
  const diff=Date.now()-new Date(iso).getTime();
  const m=Math.floor(diff/60000);
  if(m<2) return 'just now';
  if(m<60) return `${m} minutes ago`;
  const h=Math.floor(m/60);
  if(h<24) return `${h} hour${h!==1?'s':''} ago`;
  const d=Math.floor(h/24);
  if(d<30) return `${d} day${d!==1?'s':''} ago`;
  const mo=Math.floor(d/30);
  if(mo<12) return `${mo} month${mo!==1?'s':''} ago`;
  return `${Math.floor(mo/12)} year${Math.floor(mo/12)!==1?'s':''} ago`;
}

// Resolve a path relative to the current markdown file's directory.
// e.g. currentPath='docs/setup/installation.md', rel='../assets/img.png'
//      → 'docs/assets/img.png'
function resolveDocRelative(rel){
  const parts=currentPath.split('/');
  parts.pop(); // drop filename, keep directory segments
  for(const seg of rel.split('/')){
    if(seg==='..')parts.pop();
    else if(seg&&seg!=='.')parts.push(seg);
  }
  return parts.join('/');
}

// ── Frontmatter parser ──
function parseFrontmatter(md){
  const meta={};
  let body=md;
  const m=md.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?/);
  if(m){
    body=md.slice(m[0].length);
    m[1].split(/\r?\n/).forEach(line=>{
      const kv=line.match(/^(\w[\w-]*):\s*(.*)$/);
      if(!kv) return;
      const k=kv[1],v=kv[2].trim();
      if(v.startsWith('[')){
        try{meta[k]=JSON.parse(v.replace(/'/g,'"'));}
        catch{meta[k]=v.slice(1,-1).split(',').map(s=>s.trim()).filter(Boolean);}
      } else {
        meta[k]=v.replace(/^["']|["']$/g,'');
      }
    });
    if(typeof meta.tags==='string'){
      meta.tags=meta.tags.split(',').map(s=>s.trim()).filter(Boolean);
    }
  }
  return{meta,body};
}

async function init(){
  loadDisplayPrefs();
  // Base path = pathname root of this page (e.g. '/wikinest' for project pages, '' for root)
  _basePath=location.pathname.replace(/\/$/, '').replace(/\/[^/]*\.[^/]*$/, '');
  // Handle incoming deep link from 404.html redirect (?p=some/page)
  const _urlParam=new URLSearchParams(location.search).get('p');
  if(_urlParam){
    _pendingUrlPage=decodeURIComponent(_urlParam).replace(/^\/+|\.md$/g,'');
    history.replaceState(null,'',location.pathname); // strip ?p= immediately
  }
  // 1. load config.json from repo — source of truth for owner/repo/site_name/password hash
  try{
    const r=await fetch('config.json',{cache:'no-cache'});
    if(r.ok) cfg=await r.json();
  }catch{}
  cfg.provider=cfg.provider||'github';

  // 2. merge user-local overrides from localStorage (enc_token stays separate)
  const saved=localStorage.getItem('wn_cfg');
  if(saved){
    try{
      const local=JSON.parse(saved);
      if(local.lang) cfg.lang=local.lang;
    }catch{localStorage.removeItem('wn_cfg');} // purge corrupted entry
  }

  await loadI18n('ru');
  applyI18n();

  await loadRoles();
  const savedSlug=sessionStorage.getItem('wn_role');
  if(savedSlug) currentRole=roles.find(r=>r.slug===savedSlug)||null;
  applyRoleUI();
  if(!currentRole){openRoleModal();return;}

  if(cfg.owner&&cfg.repo){
    loadTree();
    setTimeout(()=>pollActions(null),1500);
  } else showSetupBanner();

  document.addEventListener('keydown',e=>{
    const inEditor=$('editor-wrap').classList.contains('edit-active');
    const modalOpen=$('modal-overlay').classList.contains('open');
    if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openSearch();}
    if((e.metaKey||e.ctrlKey)&&e.key==='s'&&inEditor){e.preventDefault();savePage();}
    // Ctrl/Cmd+E — open editor (only when viewing, not already editing)
    if((e.metaKey||e.ctrlKey)&&e.key==='e'&&!inEditor&&currentPath&&!modalOpen){e.preventDefault();startEdit();}
    // Ctrl/Cmd+Enter — confirm the primary action of an open modal
    if((e.metaKey||e.ctrlKey)&&e.key==='Enter'&&modalOpen){
      e.preventDefault();
      const primary=$('modal-actions').querySelector('.btn-primary');
      if(primary) primary.click();
    }
    if(e.key==='Escape'){
      closeSearch();
      hideWikiComplete();
      if(modalOpen) closeModal();
      else if(inEditor) cancelEdit();
    }
  });
  window.addEventListener('beforeunload',e=>{
    if(editorDirty){e.preventDefault();e.returnValue='';}
  });
}

// ── API layer (GitHub + GitLab) ──
const ghFetch=async(path,method='GET',body)=>{
  const r=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/${path}`,{
    method,
    headers:{Authorization:`Bearer ${cfg.token}`,'Content-Type':'application/json',Accept:'application/vnd.github.v3+json'},
    body:body?JSON.stringify(body):undefined
  });
  if(!r.ok){let msg=r.statusText;try{const e=await r.json();msg=e.message||msg;}catch{}throw new Error(msg);}
  return r.json();
};

const glFetch=async(path,method='GET',body)=>{
  const pid=encodeURIComponent(`${cfg.owner}/${cfg.repo}`);
  const r=await fetch(`https://gitlab.com/api/v4/projects/${pid}/${path}`,{
    method,
    headers:{'PRIVATE-TOKEN':cfg.token,'Content-Type':'application/json'},
    body:body?JSON.stringify(body):undefined
  });
  if(!r.ok){let msg=r.statusText;try{const e=await r.json();msg=e.message||msg;}catch{}throw new Error(msg);}
  if(r.status===204||method==='DELETE') return null;
  return r.json();
};

function rawUrl(path){
  if(cfg.provider==='gitlab') return`https://gitlab.com/${cfg.owner}/${cfg.repo}/-/raw/main/${path}`;
  return`https://raw.githubusercontent.com/${cfg.owner}/${cfg.repo}/HEAD/${path}`;
}

async function apiGetFile(path){
  if(cfg.provider==='gitlab'){
    const d=await glFetch(`repository/files/${encodeURIComponent(path)}?ref=main`);
    return{sha:d.last_commit_id,content:d.content};
  }
  const d=await ghFetch(`contents/${path}`);
  return{sha:d.sha,content:d.content};
}

async function apiPutFile(path,message,content,sha){
  if(cfg.provider==='gitlab'){
    const method=sha?'PUT':'POST';
    const body={branch:'main',commit_message:message,content};
    if(sha) body.last_commit_id=sha;
    await glFetch(`repository/files/${encodeURIComponent(path)}`,method,body);
    const updated=await glFetch(`repository/files/${encodeURIComponent(path)}?ref=main`);
    return{sha:updated.last_commit_id};
  }
  const body={message,content};
  if(sha) body.sha=sha;
  const d=await ghFetch(`contents/${path}`,'PUT',body);
  return{sha:d.content.sha};
}

async function apiDeleteFile(path,message,sha){
  if(cfg.provider==='gitlab'){
    await glFetch(`repository/files/${encodeURIComponent(path)}`,'DELETE',{branch:'main',commit_message:message,last_commit_id:sha});
    return;
  }
  await ghFetch(`contents/${path}`,'DELETE',{message,sha});
}

function normalizeRun(run){
  if(cfg.provider!=='gitlab') return run;
  const active=['running','preparing','pending','created','waiting_for_resource','scheduled'].includes(run.status);
  const gl2c={success:'success',failed:'failure',canceled:'cancelled',skipped:'cancelled',manual:'cancelled'};
  return{
    id:run.id,
    status:active?(run.status==='running'||run.status==='preparing'?'in_progress':'queued'):'completed',
    conclusion:active?null:(gl2c[run.status]||run.status),
    html_url:run.web_url
  };
}

// ── Password / crypto ──
const sha256=async s=>{
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
};

async function checkPassword(pw){
  const hash=await sha256(pw);
  return hash===cfg.edit_password_hash;
}

async function matchRole(pw){
  const hash=await sha256(pw);

function canEdit(){return currentRole?.can_edit===true;}

// Returns true if current role can edit a specific page
function canEditPage(page){
  if(canEdit()) return true; // owner always can
  const slug=currentRole?.slug;
  if(!slug||!page) return false;
  return Array.isArray(page.editors)&&page.editors.includes(slug);
}

const FULL_ACCESS_ROLES=['owner','admin','director','head'];

function isHiddenPage(page){
  // Check folder-level hiding from role config
  const hs=currentRole?.hidden_sections||[];
  if(hs.some(s=>page.path===s||page.path.startsWith(s+'/'))) return true;
  // Full-access roles bypass per-document restrictions
  if(FULL_ACCESS_ROLES.includes(currentRole?.slug)) return false;
  // Check per-document role whitelist (empty/absent = visible to all)
  const allowed=page.roles;
  if(allowed&&allowed.length>0){
    const slug=currentRole?.slug||null;
    if(!slug||!allowed.includes(slug)) return true;
  }
  return false;
}

// simple XOR "encryption" for token — good enough for localStorage
function encrypt(str,key){
  if(!str||!key)return str;
  return btoa([...str].map((c,i)=>String.fromCharCode(c.charCodeAt(0)^key.charCodeAt(i%key.length))).join(''));
}
function decrypt(enc,key){
  if(!enc) return '';
  if(!key) return enc; // symmetric with encrypt(): no key → stored as plaintext
  try{return[...atob(enc)].map((c,i)=>String.fromCharCode(c.charCodeAt(0)^key.charCodeAt(i%key.length))).join('');}catch{return '';}
}

// ── Page open ──
async function openPage(page){
  if(editorDirty&&!confirm('You have unsaved changes. Leave this page and discard them?')) return;
  if(isHiddenPage(page)){
    toast('У вас нет доступа к этой странице');
    return;
  }
  // Auto-expand the section this page belongs to
  const sec=findSectionForPage(page);
  if(sec&&currentSection!==sec.slug){currentSection=sec.slug;renderTree(tree);}
  trackRecentPage(page);
  const targetPath=`docs/${page.path}.md`;
  currentPath=targetPath;
  document.querySelectorAll('.tree-row').forEach(r=>r.classList.remove('active'));
  document.querySelectorAll(`.tree-row[data-path="${CSS.escape(page.path)}"]`).forEach(r=>r.classList.add('active'));

  const parts=page.parts;
  const bc=$('breadcrumb');
  bc.innerHTML=parts.map((p,i)=>
    i<parts.length-1
      ?`<span>${escHtml(p)}</span><span class="sep">›</span>`
      :`<span class="cur">${escHtml(page.title)}</span>`
  ).join('');

  $('empty').style.display='none';
  $('view-wrap').style.display='block';
  $('editor-wrap').style.display='none';
  $('editor-wrap').classList.remove('edit-active');
  $('edit-btns').style.display='none';
  const _e=canEditPage(page)?'flex':'none';
  const _o=canEdit()?'flex':'none';
  $('btn-edit').style.display=_e;
  $('btn-visibility').style.display=_o;
  $('btn-editors').style.display=_o;
  $('btn-fav').style.display='flex';
  $('btn-share').style.display='flex';
  $('btn-print').style.display='flex';
  $('btn-delete').style.display=_o;
  $('btn-rename').style.display=_o;
  $('btn-history').style.display=_e;
  updateFavBtn();
  cancelEdit();

  try{
    const r=await fetch(rawUrl(targetPath),{cache:'no-cache'});
    if(!r.ok) throw new Error(r.statusText);
    const md=await r.text();
    if(currentPath!==targetPath) return; // user navigated away before fetch completed
    // Update the address bar so users can copy a shareable direct link.
    // On next open the URL goes through 404.html → index.html?p= → openPage().
    history.replaceState(null,'',_basePath+'/'+page.path);
    currentSha=null;
    renderView(md);
  }catch(e){
    if(currentPath!==targetPath) return;
    $('view').innerHTML=`<p style="color:var(--text2)">${t('error_load')}: ${escHtml(e.message)}</p>`;
  }
}

function renderView(md){
  const{meta,body}=parseFrontmatter(md);
  let metaHtml=`<div class="page-meta">`;
  metaHtml+=`<span>${escHtml(currentPath)}</span>`;
  if(meta.author) metaHtml+=` &nbsp;·&nbsp; <span>${escHtml(t('by'))} ${escHtml(meta.author)}</span>`;
  metaHtml+=`</div>`;
  try{
    let html=marked.parse(body);
    // Rewrite relative image src attributes to absolute raw-CDN URLs.
    // Needed because the SPA is served from the Pages root, so the browser
    // resolves relative paths against the site URL, not the .md file location.
    // Matches src="..." that are not already absolute (http/https/protocol-relative/data/fragment).
    if(currentPath){
      html=html.replace(
        /(<img\b[^>]*?\bsrc=")(?!https?:\/\/|\/\/|data:|#)([^"]+)"/gi,
        (_,prefix,rel)=>`${prefix}${rawUrl(resolveDocRelative(rel))}"`
      );
    }
    $('view').innerHTML=metaHtml+html;
    // Intercept link clicks: external → new tab, internal → openPage()
    $('view').querySelectorAll('a:not(.wiki-link)').forEach(a=>{
      const href=a.getAttribute('href');
      if(!href||href.startsWith('#')) return;
      if(/^https?:\/\/|^\/\//.test(href)){
        a.target='_blank';a.rel='noopener noreferrer';
      } else {
        a.onclick=e=>{
          e.preventDefault();
          const rel=href.replace(/\.md$/,'');
          const resolved=/^\//.test(rel)?rel.replace(/^\//,''):resolveDocRelative(rel);
          const page=tree.find(p=>p.path===resolved||p.path===resolved+'/index');
          if(page) openPage(page);
          else toast('Страница не найдена: '+resolved);
        };
      }
    });
  }catch(e){$('view').innerHTML=metaHtml+`<pre style="color:var(--red);font-size:12px;padding:12px">Render error: ${escHtml(e.message)}</pre>`;}
  // Build tag chips via DOM — avoids embedding tag values in onclick HTML attributes
  if(meta.tags&&meta.tags.length){
    const tagsDiv=document.createElement('div');
    tagsDiv.className='page-tags';
    meta.tags.forEach(tag=>{
      const chip=document.createElement('span');
      chip.className='tag-chip';
      chip.textContent=tag;
      chip.onclick=()=>{openSearch();$('search-q').value=tag;runSearch(tag);};
      tagsDiv.appendChild(chip);
    });
    $('view').insertBefore(tagsDiv,$('view').firstChild.nextSibling);
  }
  if(currentPath&&/contacts/.test(currentPath)) injectBirthdayBanner($('view'));
  buildToc();
  if(window._searchHighlight){highlightInView(window._searchHighlight);window._searchHighlight=null;}
}

function injectBirthdayBanner(container){
  const MONTHS=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  const now=new Date();
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const upcoming=[];
  let section='';
  Array.from(container.childNodes).forEach(el=>{
    if(!el.tagName) return;
    if(el.tagName==='H2') section=el.textContent.trim();
    if(el.tagName!=='TABLE') return;
    const headers=Array.from(el.querySelectorAll('thead th')).map(th=>th.textContent.trim());
    const bdayIdx=headers.findIndex(h=>h.includes('🎂'));
    const nameIdx=headers.findIndex(h=>h.includes('ФИО'));
    const roleIdx=headers.findIndex(h=>h.includes('Должность'));
    if(bdayIdx<0||nameIdx<0) return;
    el.querySelectorAll('tbody tr').forEach(row=>{
      const cells=Array.from(row.querySelectorAll('td'));
      const bStr=(cells[bdayIdx]||{}).textContent?.trim();
      const name=(cells[nameIdx]||{}).textContent?.trim();
      const role=roleIdx>=0?(cells[roleIdx]||{}).textContent?.trim():'';
      if(!bStr||bStr==='—'||!name||name==='—') return;
      const m=bStr.match(/^(\d{1,2})\.(\d{1,2})/);
      if(!m) return;
      const day=parseInt(m[1]),month=parseInt(m[2])-1;
      let bday=new Date(today.getFullYear(),month,day);
      if(bday<today) bday=new Date(today.getFullYear()+1,month,day);
      const diff=Math.round((bday-today)/86400000);
      if(diff<=30) upcoming.push({name,role,section,day,month,diff});
    });
  });
  if(!upcoming.length) return;
  upcoming.sort((a,b)=>a.diff-b.diff);
  const banner=document.createElement('div');
  banner.id='birthday-banner';
  const cards=upcoming.map(p=>{
    const whenTxt=p.diff===0?'<span class="bday-today">🎉 Сегодня!</span>':p.diff===1?'завтра':'через '+p.diff+' дн.';
    return `<div class="bday-card"><div class="bday-name">${escHtml(p.name)}</div><div class="bday-role">${escHtml(p.role)} · ${escHtml(p.section)}</div><div class="bday-when">${p.day} ${MONTHS[p.month]} · ${whenTxt}</div></div>`;
  }).join('');
  banner.innerHTML=`<div class="bday-title">🎂 Дни рождения — ближайшие 30 дней</div><div class="bday-list">${cards}</div>`;
  const meta=container.querySelector('.page-meta');
  if(meta) meta.after(banner); else container.prepend(banner);
}

function highlightInView(q){
  if(!q) return;
  const re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  const walker=document.createTreeWalker($('view'),NodeFilter.SHOW_TEXT);
  const nodes=[];let n;
  while((n=walker.nextNode())) nodes.push(n);
  nodes.forEach(node=>{
    if(!re.test(node.nodeValue)) return;
    re.lastIndex=0;
    const frag=document.createDocumentFragment();
    let last=0,m;
    while((m=re.exec(node.nodeValue))!==null){
      frag.appendChild(document.createTextNode(node.nodeValue.slice(last,m.index)));
      const mark=document.createElement('mark');mark.textContent=m[0];frag.appendChild(mark);
      last=m.index+m[0].length;
    }
    frag.appendChild(document.createTextNode(node.nodeValue.slice(last)));
    node.parentNode.replaceChild(frag,node);
  });
}

function buildToc(){
  const tocEl=$('toc');
  if(!tocEl) return;
  if(!displayPrefs.showToc){tocEl.style.display='none';return;}
  const headings=[...$('view').querySelectorAll('h2,h3')];
  if(headings.length<2){tocEl.style.display='none';return;}
  tocEl.style.display='block';
  const usedIds={};
  $('toc-list').innerHTML=headings.map(h=>{
    const base=h.textContent.toLowerCase().replace(/\s+/g,'-').replace(/[^\w-]/g,'');
    let id=base;
    if(usedIds[base]){usedIds[base]++;id=`${base}-${usedIds[base]}`;}else{usedIds[base]=1;}
    h.id=id;
    return`<div class="toc-item ${h.tagName==='H3'?'toc-h2':''}" onclick="tocClick('${id}')">${escHtml(h.textContent)}</div>`;
  }).join('');
  if(location.hash){
    const target=document.getElementById(location.hash.slice(1));
    if(target) setTimeout(()=>target.scrollIntoView({behavior:'smooth'}),100);
  }
}

function tocClick(id){
  const el=document.getElementById(id);
  if(el){el.scrollIntoView({behavior:'smooth'});history.replaceState(null,'','#'+id);}
}

// ── Markdown toolbar formatting ──
// Use execCommand('insertText') so every toolbar action is a single undo step.
// setRangeText() bypasses the browser's input pipeline and breaks Ctrl+Z on
// many browsers; execCommand preserves the native undo/redo stack.
function taInsert(ta,text,start,end){
  ta.focus();
  ta.setSelectionRange(start,end);
  if(!document.execCommand('insertText',false,text)){
    // Fallback for environments where execCommand is unavailable
    ta.setRangeText(text,start,end,'end');
  }
}

function fmt(before,after,placeholder){
  const ta=$('editor');
  const s=ta.selectionStart,e=ta.selectionEnd;
  const hasSel=s!==e;
  const sel=hasSel?ta.value.slice(s,e):placeholder;
  const ins=before+sel+after;
  taInsert(ta,ins,s,e);
  if(!hasSel&&placeholder){
    ta.selectionStart=s+before.length;
    ta.selectionEnd=s+before.length+placeholder.length;
  }
  ta.dispatchEvent(new Event('input'));
}

function fmtLine(prefix){
  const ta=$('editor');
  const s=ta.selectionStart;
  const lineStart=ta.value.lastIndexOf('\n',s-1)+1;
  const lineEnd=ta.value.indexOf('\n',s);
  const end=lineEnd===-1?ta.value.length:lineEnd;
  const line=ta.value.slice(lineStart,end);
  const newLine=line.startsWith(prefix)?line.slice(prefix.length):prefix+line;
  taInsert(ta,newLine,lineStart,end);
  ta.dispatchEvent(new Event('input'));
}

function fmtTable(){
  const tmpl='\n| Column 1 | Column 2 |\n| --- | --- |\n| Cell | Cell |\n';
  fmt(tmpl,'','');
}

// ── Drag-and-drop image upload ──
function initDragDrop(){
  if(dragDropInit) return;
  dragDropInit=true;
  const wrap=$('editor-wrap');
  wrap.addEventListener('dragover',e=>{
    e.preventDefault();
    wrap.classList.add('drag-over');
  });
  wrap.addEventListener('dragleave',e=>{
    if(!wrap.contains(e.relatedTarget)) wrap.classList.remove('drag-over');
  });
  wrap.addEventListener('drop',async e=>{
    e.preventDefault();
    wrap.classList.remove('drag-over');
    const files=[...e.dataTransfer.files].filter(f=>f.type.startsWith('image/'));
    if(!files.length) return;
    const ok=await requireUnlock();
    if(!ok) return;
    for(const file of files){
      try{
        const ab=await file.arrayBuffer();
        const bytes=new Uint8Array(ab);
        let bin='';
        for(let i=0;i<bytes.length;i++) bin+=String.fromCharCode(bytes[i]);
        const b64=btoa(bin);
        const ts=Date.now();
        const safeName=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
        const uploadPath=`docs/assets/${ts}-${safeName}`;
        await apiPutFile(uploadPath,`docs: upload image ${safeName}`,b64,null);
        const url=rawUrl(uploadPath);
        const ta=$('editor');
        const pos=ta.selectionStart;
        const ins=`![${safeName}](${url})`;
        taInsert(ta,ins,pos,pos);
        ta.dispatchEvent(new Event('input'));
        toast(t('image_uploaded'));
      }catch(err){toast(`Upload failed: ${err.message}`);}
    }
  });
}

async function doRename(){
  const newRel=$('m-rename').value.trim().replace(/\.md$/,'');
  if(!newRel) return;
  if(!/^[a-zA-Z0-9_\-][a-zA-Z0-9_\-\/]*$/.test(newRel)){toast('Invalid path — use letters, numbers, hyphens, underscores and slashes only');return;}
  const oldPath=currentPath;
  const newPath=`docs/${newRel}.md`;
  if(newPath===oldPath){closeModal();return;}
  const ok=await requireUnlock();
  if(!ok) return;
  closeModal();
  try{
    const oldData=await apiGetFile(oldPath);
    const content=b64dec(oldData.content.replace(/\n/g,''));
    await apiPutFile(newPath,`docs: rename ${oldPath} → ${newPath}`,b64enc(content),null);
    await apiDeleteFile(oldPath,`docs: rename ${oldPath} → ${newPath}`,oldData.sha);
    const oldRel=oldPath.replace('docs/','').replace(/\.md$/,'');
    const parts=newRel.split('/');
    const title=parts[parts.length-1].replace(/[-_]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    const renamedPage={path:newRel,title,parts,excerpt:'',folder_titles:{}};
    tree=tree.filter(p=>p.path!==oldRel);
    tree.push(renamedPage);

    currentPath=null;currentSha=null;originalContent=null;editorDirty=false;

  }catch(e){toast(`Error: ${e.message}`);}
}

async function ensureSearchIndex(){
  if(searchIndex!==null) return;
  try{
    const r=await fetch(rawUrl('search.json'),{cache:'no-cache'});
    if(r.ok) searchIndex=await r.json();
    else searchIndex={};
  }catch{searchIndex={};}
}

function openSearch(){
  $('search-overlay').classList.add('open');
  $('search-q').value='';
  $('search-results').innerHTML='';
  setTimeout(()=>$('search-q').focus(),50);
  ensureSearchIndex();
}
function closeSearch(){$('search-overlay').classList.remove('open');hideWikiComplete();}

function runSearch(q){
  q=q.trim().toLowerCase();
  const res=$('search-results');
  if(!q){res.innerHTML='';return;}
  const hl=s=>s.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<mark>${m}</mark>`);

  const titleHits=[];
  const ftHits=[];
  const seen=new Set();

  tree.forEach(p=>{
    const inTitle=p.title.toLowerCase().includes(q)||(p.excerpt||'').toLowerCase().includes(q);
    if(inTitle){titleHits.push({p,ft:false});seen.add(p.path);}
  });

  if(searchIndex){
    tree.forEach(p=>{
      if(seen.has(p.path)) return;
      const content=searchIndex[p.path]||searchIndex[`docs/${p.path}.md`]||'';
      if(content.toLowerCase().includes(q)){ftHits.push({p,ft:true});seen.add(p.path);}
    });
  }

  const hits=[...titleHits,...ftHits].slice(0,12);
  if(!hits.length){res.innerHTML=`<div class="sr-empty">${t('search')} — no results</div>`;return;}
  res.innerHTML=hits.map(({p,ft})=>`
    <div class="sr-item" onclick="closeSearch();window._searchHighlight=${JSON.stringify(q)};openPage(${JSON.stringify(p).replace(/"/g,'&quot;')})">
      <div class="sr-title">${hl(p.title)}${ft?`<span class="sr-ft-badge">${t('full_text')}</span>`:''}</div>
      <div class="sr-excerpt">${hl(p.excerpt||p.path)}</div>
    </div>`).join('');
}

function searchKey(e){
  if(e.key==='Escape') closeSearch();
}

async function previewCommit(sha){
  $('modal-body').innerHTML=`<div style="padding:12px;font-size:12px;color:var(--text2)">${t('loading')}</div>`;
  $('modal-actions').innerHTML='';
  try{
    let content;
    if(cfg.provider==='gitlab'){
      const d=await glFetch(`repository/files/${encodeURIComponent(currentPath)}?ref=${sha}`);
      content=b64dec(d.content.replace(/\n/g,''));
    } else {
      const d=await ghFetch(`contents/${currentPath}?ref=${sha}`);
      content=b64dec(d.content.replace(/\n/g,''));
    }
    const{body}=parseFrontmatter(content);
    _pendingRestoreContent=content;
    $('modal-body').innerHTML=`<div style="max-height:320px;overflow-y:auto;border:0.5px solid var(--border);border-radius:6px;padding:14px;font-size:13px;line-height:1.65">${marked.parse(body)}</div>`;
    $('modal-actions').innerHTML=`
      <button onclick="fetchHistory()">${t('back')}</button>
      <button class="btn-primary" onclick="restoreVersion(_pendingRestoreContent)">${t('restore_version')}</button>`;
  }catch(e){
    $('modal-body').innerHTML=`<p style="color:var(--text2);font-size:13px">Error: ${escHtml(e.message)}</p>`;
    $('modal-actions').innerHTML=`<button onclick="fetchHistory()">${t('back')}</button>`;
  }
}

async function restoreVersion(content){
  closeModal();
  const ok=await requireUnlock();
  if(!ok) return;
  const data=await apiGetFile(currentPath);
  currentSha=data.sha;
  originalContent=b64dec(data.content.replace(/\n/g,''));
  editorDirty=true;
  $('editor').value=content;
  hideDraftBanner();
  _activateEditorPanel();
  const{body}=parseFrontmatter(content);
  try{$('view').innerHTML=marked.parse(body);}catch{$('view').innerHTML='';}
}

// ── Wiki autocomplete ──
function getOrCreateWikiComplete(){
  let el=document.getElementById('wiki-complete');
  if(!el){
    el=document.createElement('div');
    el.id='wiki-complete';
    el.style.display='none';
    document.body.appendChild(el);
  }
  return el;
}

function hideWikiComplete(){
  const el=document.getElementById('wiki-complete');
  if(el) el.style.display='none';
  wikiCompleteIdx=-1;
  wikiCompleteItems=[];
}

function insertWikiLink(title){
  const ta=$('editor');
  const pos=ta.selectionStart;
  const before=ta.value.slice(0,pos);
  const m=before.match(/\[\[([^\]]*)$/);
  if(!m) return;
  const start=pos-m[0].length;
  taInsert(ta,`[[${title}]]`,start,pos);
  ta.dispatchEvent(new Event('input'));
  hideWikiComplete();
}

function initWikiAutocomplete(){
  const ta=$('editor');
  if(!ta) return;
  ta.addEventListener('keyup',e=>{
    if(['ArrowUp','ArrowDown','Enter','Escape'].includes(e.key)) return;
    const pos=ta.selectionStart;
    const before=ta.value.slice(0,pos);
    const m=before.match(/\[\[([^\]]{0,40})$/);
    if(!m){hideWikiComplete();return;}
    const q=m[1].toLowerCase();
    const matches=tree.filter(p=>p.title.toLowerCase().includes(q)).slice(0,8);
    if(!matches.length){hideWikiComplete();return;}
    wikiCompleteItems=matches;
    wikiCompleteIdx=-1;
    const wrap=$('editor-wrap');
    const rect=wrap.getBoundingClientRect();
    const el=getOrCreateWikiComplete();
    el.style.left=rect.left+'px';
    el.style.top=(rect.bottom-2)+'px';
    el.style.display='block';
    el.innerHTML=matches.map((p,i)=>`<div class="wc-item" data-idx="${i}" onmousedown="event.preventDefault();insertWikiLink(${JSON.stringify(p.title)})">${escHtml(p.title)}</div>`).join('');
  });
  ta.addEventListener('keydown',e=>{
    const el=document.getElementById('wiki-complete');
    if(!el||el.style.display==='none') return;
    if(e.key==='ArrowDown'){e.preventDefault();wikiCompleteIdx=Math.min(wikiCompleteIdx+1,wikiCompleteItems.length-1);updateWikiActive();}
    else if(e.key==='ArrowUp'){e.preventDefault();wikiCompleteIdx=Math.max(wikiCompleteIdx-1,0);updateWikiActive();}
    else if(e.key==='Enter'&&wikiCompleteIdx>=0){e.preventDefault();insertWikiLink(wikiCompleteItems[wikiCompleteIdx].title);}
    else if(e.key==='Escape'){hideWikiComplete();}
  });
}

function updateWikiActive(){
  const items=document.querySelectorAll('#wiki-complete .wc-item');
  items.forEach((el,i)=>el.classList.toggle('active',i===wikiCompleteIdx));
}

// ── Settings modal ──

  const isOwner=canEdit();
  const hasToken=!!(localStorage.getItem('wn_enc_token')||cfg.token);
  $('modal-title').textContent='Настройки';
  $('modal-body').innerHTML=`
    <div style="font-size:12px;color:var(--text2);background:var(--bg2);padding:8px 10px;border-radius:6px;margin-bottom:4px">
      <span style="font-weight:500;color:var(--text)">${cfg.owner||'?'}/${cfg.repo||'?'}</span><br>
      <span style="color:var(--text3);font-size:11px">Из config.json — изменить в репозитории</span>
    </div>
    <div class="field"><label>GitHub Token</label>
      <input id="m-token" type="password" placeholder="${hasToken?'сохранён — вставьте чтобы заменить':'ghp_...'}">
      <div class="hint">Personal Access Token с правами на contents репозитория</div>
    </div>
    ${isOwner?'':`<div class="field"><label>Пароль</label>
      <input id="m-pw" type="password" placeholder="••••••••">
      <div class="hint">Пароль для шифрования токена</div>
    </div>`}
    <div class="field-sep"></div>
    <div class="field">
      <label>Отображение</label>
      <label class="toggle-row"><input type="checkbox" id="pref-toc" ${displayPrefs.showToc?'checked':''} onchange="setDisplayPref('showToc',this.checked)"><span>Показывать оглавление</span></label>
      <label class="toggle-row"><input type="checkbox" id="pref-split" ${displayPrefs.splitPreview?'checked':''} onchange="setDisplayPref('splitPreview',this.checked)"><span>Разделённый редактор</span></label>
    </div>`;
  $('modal-actions').innerHTML=`
    <button onclick="closeModal()">Отмена</button>
    <button class="btn-primary" onclick="saveSettings()">Сохранить</button>`;
  $('modal-overlay').classList.add('open');
  setTimeout(()=>$('m-token').focus(),50);
}

async function saveSettings(){
  const token=$('m-token').value.trim();
  const isOwner=canEdit();
  if(!token&&!localStorage.getItem('wn_enc_token')&&!cfg.token){
    toast('Вставьте Personal Access Token');
    return;
  }
  const activeToken=token||cfg.token||'';
  if(isOwner&&_ownerPw){
    localStorage.setItem('wn_enc_token',encrypt(activeToken,_ownerPw));
    cfg.token=activeToken;
  }else{
    const pw=$('m-pw')?.value||'';
    if(pw){
      localStorage.setItem('wn_enc_token',encrypt(activeToken,pw));
      cfg.token=activeToken;
    }else{
      localStorage.setItem('wn_enc_token',activeToken);
      cfg.token=activeToken;
    }
  }
  localStorage.setItem('wn_cfg',JSON.stringify({lang:cfg.lang}));
  closeModal();
  loadTree();
}

function closeModal(){$('modal-overlay').classList.remove('open');}

// ── Tree per-file deploy status ──
function setTreeRowStatus(relPath,status){
  const row=document.querySelector(`.tree-row[data-path="${CSS.escape(relPath)}"]`);
  if(!row) return;
  row.querySelector('.tree-status')?.remove();
  if(!status) return;
  const span=document.createElement('span');
  span.className=`tree-status tree-status--${status}`;
  span.title=status==='pending'?'Deploying…':status==='success'?'Deployed':'Deploy failed';
  span.textContent=status==='pending'?'●':status==='success'?'✓':'✗';
  row.appendChild(span);
}
function clearAllTreeStatuses(){
  document.querySelectorAll('.tree-status').forEach(el=>el.remove());
}

// ── Toast ──
let toastTimer;
function toast(msg){
  const el=$('toast');
  el.textContent=msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2500);
}


// ── Actions status ──

const statusCfg={
  in_progress:{dot:'🟡',label:'Deploying...',color:'#BA7517'},
  queued:     {dot:'🟡',label:'Queued',      color:'#BA7517'},
  success:    {dot:'🟢',label:'Deployed',    color:'#1a7f37'},
  failure:    {dot:'🔴',label:'Failed',      color:'#cf222e'},
  cancelled:  {dot:'⚪',label:'Cancelled',   color:'var(--text3)'},
};

async function fetchLatestRun(){
  if(!cfg.owner||!cfg.repo||!cfg.token) return null;
  try{
    if(cfg.provider==='gitlab'){
      const runs=await glFetch('pipelines?per_page=3');
      const run=watchingRunId
        ?(runs.find(r=>r.id===watchingRunId)||runs[0]||null)
        :(runs[0]||null);
      return run?normalizeRun(run):null;
    }
    const data=await ghFetch('actions/runs?per_page=3');
    if(watchingRunId){
      return data.workflow_runs?.find(r=>r.id===watchingRunId)
          || data.workflow_runs?.[0]
          || null;
    }
    return data.workflow_runs?.[0]||null;
  }catch{return null;}
}

function renderStatus(run){
  const el=$('actions-status');
  if(!run){el.style.display='none';return;}
  const conclusion=run.conclusion||run.status;
  const s=statusCfg[conclusion]||{dot:'⚪',label:conclusion,color:'var(--text3)'};
  el.style.display='flex';
  el.style.color=s.color;
  el.style.borderColor=s.color==='var(--text3)'?'var(--border)':s.color+'44';
  el.href=run.html_url;
  el.innerHTML=`<span>${s.dot}</span><span>${s.label}</span>`;
}

async function pollActions(onDone,onFail){
  clearTimeout(pollTimer);
  const run=await fetchLatestRun();
  renderStatus(run);
  if(!run) return;
  const active=run.status==='in_progress'||run.status==='queued';
  if(active){
    pollTimer=setTimeout(()=>pollActions(onDone,onFail),5000);
  } else {
    watchingRunId=null;
    if(run.conclusion==='success'){if(onDone) onDone();}
    else{if(onFail) onFail(run.conclusion);}
    pollTimer=setTimeout(()=>pollActions(null,null),30000);
  }
}

async function watchDeploy(savedPath){
  toast('Saved — waiting for Actions...');
  const savedRel=savedPath.replace(/^docs\//,'').replace(/\.md$/,'');
  // Cancel indicators from any previous deploy, mark this file as pending
  clearAllTreeStatuses();
  setTreeRowStatus(savedRel,'pending');
  // Each call gets a unique generation; stale loops self-cancel when gen changes
  const gen=++watchDeployGen;
  const before=await fetchLatestRun();
  const beforeId=before?.id||null;
  async function waitForNewRun(attempts=0){
    if(gen!==watchDeployGen){setTreeRowStatus(savedRel,null);return;} // superseded
    if(attempts>20){setTreeRowStatus(savedRel,null);pollActions(null,null);return;}
    const run=await fetchLatestRun();
    if(run&&run.id!==beforeId){
      watchingRunId=run.id;
      renderStatus(run);
      pollActions(
        ()=>{
          if(gen===watchDeployGen){
            setTreeRowStatus(savedRel,'success');
            setTimeout(()=>setTreeRowStatus(savedRel,null),3500);
          }
          toast('✓ Deploy complete');
          loadTree();
        },
        ()=>{
          if(gen===watchDeployGen) setTreeRowStatus(savedRel,'failure');
          toast('✗ Deploy failed');
        }
      );
    } else {
      setTimeout(()=>waitForNewRun(attempts+1),4000);
    }
  }
  setTimeout(()=>waitForNewRun(),5000);
}

// ── Editor keyboard shortcuts (Tab indent, Ctrl+B/I) ──
function initEditorShortcuts(){
  const ta=$('editor');
  if(!ta) return;
  ta.addEventListener('keydown',e=>{
    if(!$('editor-wrap').classList.contains('edit-active')) return;
    // Tab → insert 2 spaces (prevent focus shift)
    if(e.key==='Tab'&&!e.metaKey&&!e.ctrlKey&&!e.altKey){
      e.preventDefault();
      const s=ta.selectionStart,end=ta.selectionEnd;
      taInsert(ta,'  ',s,end);
      ta.dispatchEvent(new Event('input'));
      return;
    }
    // Ctrl/Cmd+B → Bold
    if((e.metaKey||e.ctrlKey)&&e.key==='b'){
      e.preventDefault();
      fmt('**','**','bold text');
      return;
    }
    // Ctrl/Cmd+I → Italic
    if((e.metaKey||e.ctrlKey)&&e.key==='i'){
      e.preventDefault();
      fmt('_','_','italic text');
      return;
    }
  });
}

// Initialize wiki autocomplete after DOM ready
initEditorShortcuts();
initWikiAutocomplete();

init();
