<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WikiNest</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js" integrity="sha512-pmjEJQ7CveksANaAKdCJZMig7eAcCFFzE1b5XnlnxdB/vU3AOStJ5SF7w4tFuqskuU31ETnAaWTYRQOYg2WHKw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<link rel="stylesheet" href="style.css">

</head>
<body>
<div id="header">
  <div class="logo">
    <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
    <span id="site-name">WikiNest</span>
  </div>
  <div id="h-space"></div>
  <button id="burger" onclick="toggleSidebar()" aria-label="Menu"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
  <div id="search-box" onclick="openSearch()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span id="lbl-search">Search...</span><span class="kbd">⌘K</span>
  </div>
  <a id="actions-status" title="GitHub Actions status" target="_blank" style="display:none;align-items:center;gap:5px;font-size:11px;padding:4px 8px;border:0.5px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text2);text-decoration:none;cursor:pointer"></a>
  <select id="lang-switcher" onchange="switchLang(this.value)"><option value="en">EN</option><option value="ru">RU</option></select>
  <button id="btn-settings" onclick="openSettings()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
  </button>
</div>
<div id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div id="layout">
  <div id="sidebar">
    <div id="sidebar-top">
      <button id="btn-new" onclick="openNewPage()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span id="lbl-new-page">New page</span>
      </button>
    </div>
    <div id="tree"></div>
  </div>
  <div id="content">
    <div id="content-bar">
      <div class="breadcrumb" id="breadcrumb"></div>
      <div id="cb-space"></div>
      <button class="bar-btn" id="btn-delete" onclick="deletePage()" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>

      <button class="bar-btn" id="btn-rename" onclick="openRenamePage()" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
        <span id="lbl-rename">Rename</span>

      <button class="bar-btn" id="btn-history" onclick="openHistory()" style="display:none">

      </button>

          <div class="tb-sep"></div>
          <!-- Headings -->

          <div class="tb-sep"></div>
          <!-- Code -->
          <button class="tb-btn" title="Inline code" onclick="fmt('`','`','code')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></button>

          <button class="tb-btn" title="Link" onclick="fmt('[','](url)','link text')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg></button>
          <button class="tb-btn" title="Image" onclick="fmt('![','](url)','alt text')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></button>

      <input id="search-q" autocomplete="off" oninput="runSearch(this.value)" onkeydown="searchKey(event)">

  <div id="modal"><h3 id="modal-title"></h3><div id="modal-body"></div><div class="modal-actions" id="modal-actions"></div></div>
</div>
<div id="pw-overlay">
  <div id="pw-box">
    <h3 id="pw-title">Enter password to edit</h3>
    <input type="password" id="pw-input" onkeydown="if(event.key==='Enter')submitPw()">
    <div id="pw-error"></div>
    <div class="pw-actions">
      <button onclick="closePw()"><span id="lbl-pw-cancel">Cancel</span></button>
      <button class="btn-primary" onclick="submitPw()"><span id="lbl-pw-ok">Unlock</span></button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
const $=id=>document.getElementById(id);

// ── Config & i18n ──
let cfg={},i18n={};

// ── Page tree ──
let tree=[];

// ── Navigation state ──
let currentPath=null,currentSha=null;

// ── Editor state ──
let editorDirty=false,originalContent=null,dragDropInit=false;

// ── Auth state ──
let unlocked=false,pwResolve=null;

// ── Search ──
let searchIndex=null;

// ── Wiki autocomplete ──
let wikiCompleteIdx=-1,wikiCompleteItems=[];

// ── Pending restore content (avoids embedding large strings in onclick HTML) ──
let _pendingRestoreContent=null;

// ── Pending folder path for folder-rename modal ──
let _pendingFolderPath=null;

// ── Deep-link routing ──
// _pendingUrlPage: page path read from ?p= on startup (set by 404.html redirect)
// _basePath: repo root prefix in the URL, e.g. '/wikinest' or '' for custom domains
let _pendingUrlPage=null,_basePath='';

// ── Deploy watcher ──
let pollTimer=null,watchingRunId=null,watchDeployGen=0;

// ── Display preferences (persisted to localStorage) ──
let displayPrefs={showToc:true,splitPreview:true};
function loadDisplayPrefs(){
  try{const d=localStorage.getItem('wn_display');if(d)displayPrefs={...displayPrefs,...JSON.parse(d)};}catch{}
}
function saveDisplayPref(key,val){
  displayPrefs[key]=val;
  localStorage.setItem('wn_display',JSON.stringify(displayPrefs));
}
function setDisplayPref(key,val){
  saveDisplayPref(key,val);
  if(key==='showToc') buildToc();
  // splitPreview takes effect next time edit is opened — no re-init needed
}

const t=k=>i18n[k]??k;

// ── Wiki link extension (registered after marked loads) ──
const wikiLinkExtension={
  name:'wikilink',
  level:'inline',
  start(src){return src.indexOf('[[');},
  tokenizer(src){
    const match=src.match(/^\[\[([^\]]+)\]\]/);
    if(match) return{type:'wikilink',raw:match[0],text:match[1].trim()};
  },
  renderer(token){
    const page=tree.find(p=>
      p.title.toLowerCase()===token.text.toLowerCase()||
      p.path.toLowerCase()===token.text.toLowerCase()
    );
    if(page){
      const data=JSON.stringify(page).replace(/"/g,'&quot;');
      return`<a href="#" class="wiki-link" onclick="openPage(${data});return false">${escHtml(token.text)}</a>`;
    }
    return`<span class="wiki-link broken" title="Page not found">${escHtml(token.text)}</span>`;
  }
};
marked.use({extensions:[wikiLinkExtension]});

// ── Helpers ──
function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function relativeDate(iso){
  const diff=Date.now()-new Date(iso).getTime();
  const m=Math.floor(diff/60000);
  if(m<2) return 'just now';
  if(m<60) return `${m} minutes ago`;
  const h=Math.floor(m/60);
  if(h<24) return `${h} hour${h!==1?'s':''} ago`;
  const d=Math.floor(h/24);
  if(d<30) return `${d} day${d!==1?'s':''} ago`;
  const mo=Math.floor(d/30);
  if(mo<12) return `${mo} month${mo!==1?'s':''} ago`;
  return `${Math.floor(mo/12)} year${Math.floor(mo/12)!==1?'s':''} ago`;
}

// Resolve a path relative to the current markdown file's directory.
// e.g. currentPath='docs/setup/installation.md', rel='../assets/img.png'
//      → 'docs/assets/img.png'
function resolveDocRelative(rel){
  const parts=currentPath.split('/');
  parts.pop(); // drop filename, keep directory segments
  for(const seg of rel.split('/')){
    if(seg==='..')parts.pop();
    else if(seg&&seg!=='.')parts.push(seg);
  }
  return parts.join('/');
}

// ── Debounced preview render (shared by startEdit + restoreVersion) ──
const renderPreviewDebounced=debounce(()=>{
  const{body}=parseFrontmatter($('editor').value);
  try{$('view').innerHTML=marked.parse(body);}
  catch(e){$('view').innerHTML=`<pre style="color:var(--red);font-size:12px;padding:12px">Render error: ${escHtml(e.message)}</pre>`;}
},150);

// ── Draft helpers ──
const draftKey=path=>`wn_draft_${path}`;
function saveDraft(path,content){try{localStorage.setItem(draftKey(path),JSON.stringify({content,ts:Date.now()}));}catch{}}
function loadDraft(path){try{const d=localStorage.getItem(draftKey(path));return d?JSON.parse(d):null;}catch{return null;}}
function clearDraft(path){try{localStorage.removeItem(draftKey(path));}catch{}}

// ── Frontmatter parser ──
function parseFrontmatter(md){
  const meta={};
  let body=md;
  const m=md.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?/);
  if(m){
    body=md.slice(m[0].length);
    m[1].split(/\r?\n/).forEach(line=>{
      const kv=line.match(/^(\w[\w-]*):\s*(.*)$/);
      if(!kv) return;
      const k=kv[1],v=kv[2].trim();
      if(v.startsWith('[')){
        try{meta[k]=JSON.parse(v.replace(/'/g,'"'));}
        catch{meta[k]=v.slice(1,-1).split(',').map(s=>s.trim()).filter(Boolean);}
      } else {
        meta[k]=v.replace(/^["']|["']$/g,'');
      }
    });
    if(typeof meta.tags==='string'){
      meta.tags=meta.tags.split(',').map(s=>s.trim()).filter(Boolean);
    }
  }
  return{meta,body};
}

async function init(){
  loadDisplayPrefs();
  // Base path = pathname root of this page (e.g. '/wikinest' for project pages, '' for root)
  _basePath=location.pathname.replace(/\/$/, '').replace(/\/[^/]*\.[^/]*$/, '');
  // Handle incoming deep link from 404.html redirect (?p=some/page)
  const _urlParam=new URLSearchParams(location.search).get('p');
  if(_urlParam){
    _pendingUrlPage=decodeURIComponent(_urlParam).replace(/^\/+|\.md$/g,'');
    history.replaceState(null,'',location.pathname); // strip ?p= immediately
  }
  // 1. load config.json from repo — source of truth for owner/repo/site_name/password hash
  try{
    const r=await fetch('config.json',{cache:'no-cache'});
    if(r.ok) cfg=await r.json();
  }catch{}
  cfg.provider=cfg.provider||'github';

  // 2. merge user-local overrides from localStorage (enc_token stays separate)
  const saved=localStorage.getItem('wn_cfg');
  if(saved){
    try{
      const local=JSON.parse(saved);
      if(local.lang) cfg.lang=local.lang;
    }catch{localStorage.removeItem('wn_cfg');} // purge corrupted entry
  }

  const lang=localStorage.getItem('wn_lang')||cfg.lang||'en';
  const lsEl=$('lang-switcher');
  if(lsEl) lsEl.value=lang;
  await loadI18n(lang);
  applyI18n();

  if(cfg.owner&&cfg.repo){
    loadTree();
    setTimeout(()=>pollActions(null),1500);
  } else showSetupBanner();

  document.addEventListener('keydown',e=>{
    const inEditor=$('editor-wrap').classList.contains('edit-active');
    const modalOpen=$('modal-overlay').classList.contains('open');
    if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openSearch();}
    if((e.metaKey||e.ctrlKey)&&e.key==='s'&&inEditor){e.preventDefault();savePage();}
    // Ctrl/Cmd+E — open editor (only when viewing, not already editing)
    if((e.metaKey||e.ctrlKey)&&e.key==='e'&&!inEditor&&currentPath&&!modalOpen){e.preventDefault();startEdit();}
    // Ctrl/Cmd+Enter — confirm the primary action of an open modal
    if((e.metaKey||e.ctrlKey)&&e.key==='Enter'&&modalOpen){
      e.preventDefault();
      const primary=$('modal-actions').querySelector('.btn-primary');
      if(primary) primary.click();
    }
    if(e.key==='Escape'){
      closeSearch();
      hideWikiComplete();
      if(modalOpen) closeModal();
      else if(inEditor) cancelEdit();
    }
  });
  window.addEventListener('beforeunload',e=>{
    if(editorDirty){e.preventDefault();e.returnValue='';}
  });
}

// ── API layer (GitHub + GitLab) ──
const ghFetch=async(path,method='GET',body)=>{
  const r=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/${path}`,{
    method,
    headers:{Authorization:`Bearer ${cfg.token}`,'Content-Type':'application/json',Accept:'application/vnd.github.v3+json'},
    body:body?JSON.stringify(body):undefined
  });
  if(!r.ok){let msg=r.statusText;try{const e=await r.json();msg=e.message||msg;}catch{}throw new Error(msg);}
  return r.json();
};

const glFetch=async(path,method='GET',body)=>{
  const pid=encodeURIComponent(`${cfg.owner}/${cfg.repo}`);
  const r=await fetch(`https://gitlab.com/api/v4/projects/${pid}/${path}`,{
    method,
    headers:{'PRIVATE-TOKEN':cfg.token,'Content-Type':'application/json'},
    body:body?JSON.stringify(body):undefined
  });
  if(!r.ok){let msg=r.statusText;try{const e=await r.json();msg=e.message||msg;}catch{}throw new Error(msg);}
  if(r.status===204||method==='DELETE') return null;
  return r.json();
};

function rawUrl(path){
  if(cfg.provider==='gitlab') return`https://gitlab.com/${cfg.owner}/${cfg.repo}/-/raw/main/${path}`;
  return`https://raw.githubusercontent.com/${cfg.owner}/${cfg.repo}/HEAD/${path}`;
}

async function apiGetFile(path){
  if(cfg.provider==='gitlab'){
    const d=await glFetch(`repository/files/${encodeURIComponent(path)}?ref=main`);
    return{sha:d.last_commit_id,content:d.content};
  }
  const d=await ghFetch(`contents/${path}`);
  return{sha:d.sha,content:d.content};
}

async function apiPutFile(path,message,content,sha){
  if(cfg.provider==='gitlab'){
    const method=sha?'PUT':'POST';
    const body={branch:'main',commit_message:message,content};
    if(sha) body.last_commit_id=sha;
    await glFetch(`repository/files/${encodeURIComponent(path)}`,method,body);
    const updated=await glFetch(`repository/files/${encodeURIComponent(path)}?ref=main`);
    return{sha:updated.last_commit_id};
  }
  const body={message,content};
  if(sha) body.sha=sha;
  const d=await ghFetch(`contents/${path}`,'PUT',body);
  return{sha:d.content.sha};
}

async function apiDeleteFile(path,message,sha){
  if(cfg.provider==='gitlab'){
    await glFetch(`repository/files/${encodeURIComponent(path)}`,'DELETE',{branch:'main',commit_message:message,last_commit_id:sha});
    return;
  }
  await ghFetch(`contents/${path}`,'DELETE',{message,sha});
}

function normalizeRun(run){
  if(cfg.provider!=='gitlab') return run;
  const active=['running','preparing','pending','created','waiting_for_resource','scheduled'].includes(run.status);
  const gl2c={success:'success',failed:'failure',canceled:'cancelled',skipped:'cancelled',manual:'cancelled'};
  return{
    id:run.id,
    status:active?(run.status==='running'||run.status==='preparing'?'in_progress':'queued'):'completed',
    conclusion:active?null:(gl2c[run.status]||run.status),
    html_url:run.web_url
  };
}

const b64enc=s=>btoa(unescape(encodeURIComponent(s)));
const b64dec=s=>decodeURIComponent(escape(atob(s)));

// ── Password / crypto ──
const sha256=async s=>{
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
};

async function checkPassword(pw){
  const hash=await sha256(pw);
  return hash===cfg.edit_password_hash;
}

function requireUnlock(){
  return new Promise(resolve=>{
    if(unlocked){resolve(true);return;}
    pwResolve=resolve;
    $('pw-input').value='';
    $('pw-error').style.display='none';
    $('pw-overlay').classList.add('open');
    setTimeout(()=>$('pw-input').focus(),50);
  });
}
async function submitPw(){
  const pw=$('pw-input').value;
  if(!cfg.edit_password_hash||await checkPassword(pw)){
    unlocked=true;
    cfg.token=decrypt(localStorage.getItem('wn_enc_token'),pw);
    closePw();
    if(pwResolve){pwResolve(true);pwResolve=null;}
  }else{
    $('pw-error').textContent=t('password_wrong');
    $('pw-error').style.display='block';
  }
}
function closePw(){$('pw-overlay').classList.remove('open');}

// simple XOR "encryption" for token — good enough for localStorage
function encrypt(str,key){
  if(!str||!key)return str;
  return btoa([...str].map((c,i)=>String.fromCharCode(c.charCodeAt(0)^key.charCodeAt(i%key.length))).join(''));
}
function decrypt(enc,key){
  if(!enc) return '';
  if(!key) return enc; // symmetric with encrypt(): no key → stored as plaintext
  try{return[...atob(enc)].map((c,i)=>String.fromCharCode(c.charCodeAt(0)^key.charCodeAt(i%key.length))).join('');}catch{return '';}
}

// ── Tree ──
async function loadTree(){
  $('tree').innerHTML=`<div style="padding:12px;font-size:12px;color:var(--text2)">${t('loading')}</div>`;
  try{
    const r=await fetch(rawUrl('tree.json'),{cache:'no-cache'});
    if(!r.ok) throw new Error();
    tree=await r.json();
    renderTree(tree);
    if(!currentPath){
      if(_pendingUrlPage){
        const targetPage=tree.find(p=>p.path.toLowerCase()===_pendingUrlPage.toLowerCase());
        _pendingUrlPage=null;
        if(targetPage){openPage(targetPage);return;}
      }
      const homePage=tree.find(p=>p.path==='home');
      if(homePage) openPage(homePage);
      else showEmpty();
    }
  }catch{
    $('tree').innerHTML=`<div style="padding:12px;font-size:12px;color:var(--text2)">${t('error_load')}</div>`;
  }
}

function renderTree(pages){
  const root={};
  pages.forEach(p=>{
    const parts=p.parts;
    let node=root;
    parts.forEach((part,i)=>{
      if(!node[part]) node[part]={_page:i===parts.length-1?p:null,_children:{}};
      node=node[part]._children;
    });
  });
  const el=$('tree');
  el.innerHTML=`<div class="tree-section">${t('pages')}</div>`;
  renderNode(root,el,0);
}

function getFolderTitle(node,key){
  const item=node[key];
  function findFirst(n){for(const k of Object.keys(n)){if(n[k]._page)return n[k]._page;const r=findFirst(n[k]._children);if(r)return r;}return null;}
  const p=item._page||findFirst(item._children);
  return p?.folder_titles?.[key]||key.replace(/[-_]/g," ").replace(/\b\w/g,c=>c.toUpperCase());
}
function renderNode(node,el,depth,parentPath=''){
  Object.keys(node).sort((a,b)=>{
    const aHasKids=Object.keys(node[a]._children).length>0;
    const bHasKids=Object.keys(node[b]._children).length>0;
    if(aHasKids!==bHasKids) return aHasKids?-1:1;
    return a.localeCompare(b);
  }).forEach(key=>{
    const item=node[key];
    const hasKids=Object.keys(item._children).length>0;
    const wrap=document.createElement('div');

    const row=document.createElement('div');
    row.className='tree-row'+(hasKids?' folder':'');
    row.style.paddingLeft=(14+depth*14)+'px';

    if(hasKids){
      const fullFolderPath=parentPath?`${parentPath}/${key}`:key;
      // Build folder row via DOM so the rename button can capture the path in a closure
      row.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>';
      const lbl=document.createElement('span');
      lbl.className='tree-label';
      lbl.textContent=getFolderTitle(node,key);
      row.appendChild(lbl);
      // Rename-display-name button (pencil) — visible on hover
      const rBtn=document.createElement('button');
      rBtn.className='folder-rename-btn';
      rBtn.title=t('rename_folder')||'Rename folder';
      rBtn.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
      rBtn.onclick=e=>{e.stopPropagation();openFolderRename(fullFolderPath);};
      row.appendChild(rBtn);
      // Add-page button (+) — opens New page dialog pre-filled with this folder
      const aBtn=document.createElement('button');
      aBtn.className='folder-add-btn';
      aBtn.title=t('new_page_in_folder')||'New page in this folder';
      aBtn.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';
      aBtn.onclick=e=>{e.stopPropagation();openNewPage(fullFolderPath);};
      row.appendChild(aBtn);
      const kids=document.createElement('div');
      kids.className='tree-children';
      renderNode(item._children,kids,depth+1,fullFolderPath);
      row.onclick=()=>kids.classList.toggle('collapsed');
      wrap.appendChild(row);
      wrap.appendChild(kids);
    }else{
      row.dataset.path=item._page.path;
      row.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span class="tree-label">${escHtml(item._page.title)}</span>`;
      row.onclick=()=>openPage(item._page);
      wrap.appendChild(row);
    }
    el.appendChild(wrap);
  });
}

// ── Page open ──
async function openPage(page){
  if(editorDirty&&!confirm('You have unsaved changes. Leave this page and discard them?')) return;
  const targetPath=`docs/${page.path}.md`;
  currentPath=targetPath;
  document.querySelectorAll('.tree-row').forEach(r=>r.classList.remove('active'));
  document.querySelectorAll(`.tree-row[data-path="${CSS.escape(page.path)}"]`).forEach(r=>r.classList.add('active'));

  const parts=page.parts;
  const bc=$('breadcrumb');
  bc.innerHTML=parts.map((p,i)=>
    i<parts.length-1
      ?`<span>${escHtml(p)}</span><span class="sep">›</span>`
      :`<span class="cur">${escHtml(page.title)}</span>`
  ).join('');

  $('empty').style.display='none';
  $('view-wrap').style.display='block';
  $('editor-wrap').style.display='none';
  $('editor-wrap').classList.remove('edit-active');
  $('edit-btns').style.display='none';
  $('btn-edit').style.display='flex';
  $('btn-print').style.display='flex';
  $('btn-delete').style.display='flex';
  $('btn-rename').style.display='flex';
  $('btn-history').style.display='flex';
  cancelEdit();

  try{
    const r=await fetch(rawUrl(targetPath),{cache:'no-cache'});
    if(!r.ok) throw new Error(r.statusText);
    const md=await r.text();
    if(currentPath!==targetPath) return; // user navigated away before fetch completed
    // Update the address bar so users can copy a shareable direct link.
    // On next open the URL goes through 404.html → index.html?p= → openPage().
    history.replaceState(null,'',_basePath+'/'+page.path);
    currentSha=null;
    renderView(md);
  }catch(e){
    if(currentPath!==targetPath) return;
    $('view').innerHTML=`<p style="color:var(--text2)">${t('error_load')}: ${escHtml(e.message)}</p>`;
  }
}

function renderView(md){
  const{meta,body}=parseFrontmatter(md);
  let metaHtml=`<div class="page-meta">`;
  metaHtml+=`<span>${escHtml(currentPath)}</span>`;
  if(meta.author) metaHtml+=` &nbsp;·&nbsp; <span>${escHtml(t('by'))} ${escHtml(meta.author)}</span>`;
  metaHtml+=`</div>`;
  try{
    let html=marked.parse(body);
    // Rewrite relative image src attributes to absolute raw-CDN URLs.
    // Needed because the SPA is served from the Pages root, so the browser
    // resolves relative paths against the site URL, not the .md file location.
    // Matches src="..." that are not already absolute (http/https/protocol-relative/data/fragment).
    if(currentPath){
      html=html.replace(
        /(<img\b[^>]*?\bsrc=")(?!https?:\/\/|\/\/|data:|#)([^"]+)"/gi,
        (_,prefix,rel)=>`${prefix}${rawUrl(resolveDocRelative(rel))}"`
      );
    }
    $('view').innerHTML=metaHtml+html;
  }catch(e){$('view').innerHTML=metaHtml+`<pre style="color:var(--red);font-size:12px;padding:12px">Render error: ${escHtml(e.message)}</pre>`;}
  // Build tag chips via DOM — avoids embedding tag values in onclick HTML attributes
  if(meta.tags&&meta.tags.length){
    const tagsDiv=document.createElement('div');
    tagsDiv.className='page-tags';
    meta.tags.forEach(tag=>{
      const chip=document.createElement('span');
      chip.className='tag-chip';
      chip.textContent=tag;
      chip.onclick=()=>{openSearch();$('search-q').value=tag;runSearch(tag);};
      tagsDiv.appendChild(chip);
    });
    $('view').insertBefore(tagsDiv,$('view').firstChild.nextSibling);
  }
  buildToc();
}

function buildToc(){
  const tocEl=$('toc');
  if(!tocEl) return;
  if(!displayPrefs.showToc){tocEl.style.display='none';return;}
  const headings=[...$('view').querySelectorAll('h2,h3')];
  if(headings.length<2){tocEl.style.display='none';return;}
  tocEl.style.display='block';
  const usedIds={};
  $('toc-list').innerHTML=headings.map(h=>{
    const base=h.textContent.toLowerCase().replace(/\s+/g,'-').replace(/[^\w-]/g,'');
    let id=base;
    if(usedIds[base]){usedIds[base]++;id=`${base}-${usedIds[base]}`;}else{usedIds[base]=1;}
    h.id=id;
    return`<div class="toc-item ${h.tagName==='H3'?'toc-h2':''}" onclick="tocClick('${id}')">${escHtml(h.textContent)}</div>`;
  }).join('');
  if(location.hash){
    const target=document.getElementById(location.hash.slice(1));
    if(target) setTimeout(()=>target.scrollIntoView({behavior:'smooth'}),100);
  }
}

function tocClick(id){
  const el=document.getElementById(id);
  if(el){el.scrollIntoView({behavior:'smooth'});history.replaceState(null,'','#'+id);}
}

// ── Markdown toolbar formatting ──
// Use execCommand('insertText') so every toolbar action is a single undo step.
// setRangeText() bypasses the browser's input pipeline and breaks Ctrl+Z on
// many browsers; execCommand preserves the native undo/redo stack.
function taInsert(ta,text,start,end){
  ta.focus();
  ta.setSelectionRange(start,end);
  if(!document.execCommand('insertText',false,text)){
    // Fallback for environments where execCommand is unavailable
    ta.setRangeText(text,start,end,'end');
  }
}

function fmt(before,after,placeholder){
  const ta=$('editor');
  const s=ta.selectionStart,e=ta.selectionEnd;
  const hasSel=s!==e;
  const sel=hasSel?ta.value.slice(s,e):placeholder;
  const ins=before+sel+after;
  taInsert(ta,ins,s,e);
  if(!hasSel&&placeholder){
    ta.selectionStart=s+before.length;
    ta.selectionEnd=s+before.length+placeholder.length;
  }
  ta.dispatchEvent(new Event('input'));
}

function fmtLine(prefix){
  const ta=$('editor');
  const s=ta.selectionStart;
  const lineStart=ta.value.lastIndexOf('\n',s-1)+1;
  const lineEnd=ta.value.indexOf('\n',s);
  const end=lineEnd===-1?ta.value.length:lineEnd;
  const line=ta.value.slice(lineStart,end);
  const newLine=line.startsWith(prefix)?line.slice(prefix.length):prefix+line;
  taInsert(ta,newLine,lineStart,end);
  ta.dispatchEvent(new Event('input'));
}

function fmtTable(){
  const tmpl='\n| Column 1 | Column 2 |\n| --- | --- |\n| Cell | Cell |\n';
  fmt(tmpl,'','');
}

// ── Drag-and-drop image upload ──
function initDragDrop(){
  if(dragDropInit) return;
  dragDropInit=true;
  const wrap=$('editor-wrap');
  wrap.addEventListener('dragover',e=>{
    e.preventDefault();
    wrap.classList.add('drag-over');
  });
  wrap.addEventListener('dragleave',e=>{
    if(!wrap.contains(e.relatedTarget)) wrap.classList.remove('drag-over');
  });
  wrap.addEventListener('drop',async e=>{
    e.preventDefault();
    wrap.classList.remove('drag-over');
    const files=[...e.dataTransfer.files].filter(f=>f.type.startsWith('image/'));
    if(!files.length) return;
    const ok=await requireUnlock();
    if(!ok) return;
    for(const file of files){
      try{
        const ab=await file.arrayBuffer();
        const bytes=new Uint8Array(ab);
        let bin='';
        for(let i=0;i<bytes.length;i++) bin+=String.fromCharCode(bytes[i]);
        const b64=btoa(bin);
        const ts=Date.now();
        const safeName=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
        const uploadPath=`docs/assets/${ts}-${safeName}`;
        await apiPutFile(uploadPath,`docs: upload image ${safeName}`,b64,null);
        const url=rawUrl(uploadPath);
        const ta=$('editor');
        const pos=ta.selectionStart;
        const ins=`![${safeName}](${url})`;
        taInsert(ta,ins,pos,pos);
        ta.dispatchEvent(new Event('input'));
        toast(t('image_uploaded'));
      }catch(err){toast(`Upload failed: ${err.message}`);}
    }
  });
}

const saveDraftDebounced=debounce((path,content)=>saveDraft(path,content),500);

function showDraftBanner(){$('draft-banner').classList.add('show');}
function hideDraftBanner(){$('draft-banner').classList.remove('show');}

function restoreDraft(){
  const draft=loadDraft(currentPath);
  if(!draft) return;
  $('editor').value=draft.content;

}

function discardDraft(){

// ── Edit ──

// Shared panel activation — called by both startEdit() and restoreVersion()
function _activateEditorPanel(){
  if(displayPrefs.splitPreview) $('panels').classList.add('split');
  $('editor-wrap').style.display='';
  $('editor-wrap').classList.add('edit-active');
  const tocEl=$('toc');if(tocEl)tocEl.style.display='none';
  $('btn-edit').style.display='none';
  $('btn-print').style.display='none';
  $('btn-delete').style.display='none';
  $('btn-rename').style.display='none';
  $('btn-history').style.display='none';
  $('edit-btns').style.display='flex';
  $('editor').oninput=()=>{
    editorDirty=$('editor').value!==originalContent;
    renderPreviewDebounced();
    saveDraftDebounced(currentPath,$('editor').value);
  };
  initDragDrop();
  $('editor').focus();
}

async function startEdit(){
  $('btn-edit').disabled=true;
  try{
  const ok=await requireUnlock();
  if(!ok){$('btn-edit').disabled=false;return;}
  const data=await apiGetFile(currentPath);
  currentSha=data.sha;
  const md=b64dec(data.content.replace(/\n/g,''));
  originalContent=md;
  editorDirty=false;
  $('editor').value=md;
  const draft=loadDraft(currentPath);
  if(draft&&draft.content!==originalContent) showDraftBanner();
  else hideDraftBanner();
  _activateEditorPanel(); // btn-edit is hidden inside here, so no need to re-enable
  }catch(e){$('btn-edit').disabled=false;toast(`${t('error_load')}: ${escHtml(e.message)}`);}
}

function cancelEdit(){
  if(originalContent!==null){renderView(originalContent);originalContent=null;}
  editorDirty=false;
  hideDraftBanner();
  hideWikiComplete();
  $('panels').classList.remove('split');
  $('editor-wrap').style.display='none';
  $('editor-wrap').classList.remove('edit-active');
  $('edit-btns').style.display='none';
  $('view-wrap').style.display=currentPath?'block':'none';
  $('btn-edit').style.display=currentPath?'flex':'none';
  $('btn-print').style.display=currentPath?'flex':'none';
  $('btn-delete').style.display=currentPath?'flex':'none';
  $('btn-rename').style.display=currentPath?'flex':'none';
  $('btn-history').style.display=currentPath?'flex':'none';
  buildToc();
}

async function savePage(){
  const content=$('editor').value;
  const btn=$('btn-save');
  const spin=$('save-spin');
  btn.disabled=true;spin.style.display='inline-block';
  try{
    const saved=await apiPutFile(currentPath,`docs: update ${currentPath}`,b64enc(content),currentSha);
    currentSha=saved.sha;
    originalContent=content;
    editorDirty=false;
    clearDraft(currentPath);
    renderView(content);
    cancelEdit();
    watchDeploy(currentPath);
  }catch(e){
    toast(`${t('error_save')}: ${e.message}`);
  }finally{
    btn.disabled=false;spin.style.display='none';
  }
}

async function createPage(){
  const ok=await requireUnlock();
  if(!ok) return;
  const folder=($('m-folder')||{value:''}).value.trim();
  const name=($('m-name')||{value:''}).value.trim().replace(/\.md$/,'');
  if(!name){toast(t('page_name_empty')||'Enter a page name');return;}
  if(!/^[a-zA-Z0-9_\-]+$/.test(name)){toast(t('page_name_invalid')||'Page name: letters, numbers, hyphens and underscores only');return;}
  const path=folder?`${folder}/${name}`:name;
  const fullPath=`docs/${path}.md`;
  const title=path.split('/').pop().replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  const content=`# ${title}\n\nStart writing here.\n`;
  try{
    await apiPutFile(fullPath,`docs: create ${fullPath}`,b64enc(content),null);
    closeModal();
    const page={path,title,parts:path.split('/'),excerpt:'',folder_titles:{}};
    tree.push(page);
    renderTree(tree);
    openPage(page);
    watchDeploy(fullPath);
  }catch(e){toast(`${t('error_save')}: ${e.message}`);}
}

  $('modal-actions').innerHTML=`

  $('modal-overlay').classList.add('open');
  setTimeout(()=>{const el=$('m-rename');el.focus();el.setSelectionRange(el.value.length,el.value.length);},50);

async function doRename(){
  const newRel=$('m-rename').value.trim().replace(/\.md$/,'');
  if(!newRel) return;
  if(!/^[a-zA-Z0-9_\-][a-zA-Z0-9_\-\/]*$/.test(newRel)){toast('Invalid path — use letters, numbers, hyphens, underscores and slashes only');return;}
  const oldPath=currentPath;
  const newPath=`docs/${newRel}.md`;
  if(newPath===oldPath){closeModal();return;}
  const ok=await requireUnlock();
  if(!ok) return;
  closeModal();
  try{
    const oldData=await apiGetFile(oldPath);
    const content=b64dec(oldData.content.replace(/\n/g,''));
    await apiPutFile(newPath,`docs: rename ${oldPath} → ${newPath}`,b64enc(content),null);
    await apiDeleteFile(oldPath,`docs: rename ${oldPath} → ${newPath}`,oldData.sha);
    const oldRel=oldPath.replace('docs/','').replace(/\.md$/,'');
    const parts=newRel.split('/');
    const title=parts[parts.length-1].replace(/[-_]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    const renamedPage={path:newRel,title,parts,excerpt:'',folder_titles:{}};
    tree=tree.filter(p=>p.path!==oldRel);
    tree.push(renamedPage);
    renderTree(tree);
    currentPath=null;currentSha=null;originalContent=null;editorDirty=false;
    $('panels').classList.remove('split');
    $('view-wrap').style.display='none';
    $('btn-edit').style.display='none';
    $('btn-delete').style.display='none';
    $('btn-rename').style.display='none';
    $('btn-history').style.display='none';
    $('breadcrumb').innerHTML='';
    const tocRen=$('toc');if(tocRen)tocRen.style.display='none';
    showEmpty();
    toast(t('saved'));
    openPage(renamedPage);
    watchDeploy(newPath);
  }catch(e){toast(`Error: ${e.message}`);}
}

// ── Folder display-name rename (via _meta.json) ──
function openFolderRename(folderPath){
  _pendingFolderPath=folderPath;
  const segKey=folderPath.split('/').pop();
  // Try to get the current display name from any page inside this folder
  const sample=tree.find(p=>p.path.startsWith(folderPath+'/'));
  const currentTitle=sample?.folder_titles?.[segKey]
    ||segKey.replace(/[-_]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  $('modal-title').textContent=t('rename_folder');
  $('modal-body').innerHTML=`
    <div class="field"><label>${t('folder_display_name')}</label>
    <input id="m-folder-name" value="${escHtml(currentTitle)}">
    <div class="hint">${t('folder_display_name_hint')}</div></div>`;
  $('modal-actions').innerHTML=`
    <button onclick="closeModal()">${t('cancel')}</button>
    <button class="btn-primary" onclick="doFolderRename()">${t('save')}</button>`;
  $('modal-overlay').classList.add('open');
  setTimeout(()=>{const el=$('m-folder-name');if(el){el.focus();el.select();}},50);
}

async function doFolderRename(){
  const newTitle=($('m-folder-name')?.value||'').trim();
  if(!newTitle||!_pendingFolderPath) return;
  const folderPath=_pendingFolderPath;
  const ok=await requireUnlock();
  if(!ok) return;
  closeModal();
  const metaPath=`docs/${folderPath}/_meta.json`;
  const metaContent=b64enc(JSON.stringify({title:newTitle},null,2));
  try{
    // Check if _meta.json already exists (need SHA to update, null to create)
    let sha=null;
    try{const existing=await apiGetFile(metaPath);sha=existing.sha;}catch{}
    await apiPutFile(metaPath,`chore: rename folder display name "${folderPath}"`,metaContent,sha);
    // Optimistic update: set folder_titles[segKey] on all pages inside this folder
    const segKey=folderPath.split('/').pop();
    tree.forEach(p=>{
      if(p.path.startsWith(folderPath+'/')){
        if(!p.folder_titles) p.folder_titles={};
        p.folder_titles[segKey]=newTitle;
      }
    });
    renderTree(tree);
    // Re-select active page row if one was open
    if(currentPath){
      const rel=currentPath.replace(/^docs\//,'').replace(/\.md$/,'');
      document.querySelectorAll(`.tree-row[data-path="${CSS.escape(rel)}"]`).forEach(r=>r.classList.add('active'));
    }
    toast(t('folder_renamed'));
    watchDeploy(metaPath);
  }catch(e){toast(`Error: ${escHtml(e.message)}`);}
}

async function ensureSearchIndex(){
  if(searchIndex!==null) return;
  try{
    const r=await fetch(rawUrl('search.json'),{cache:'no-cache'});
    if(r.ok) searchIndex=await r.json();
    else searchIndex={};
  }catch{searchIndex={};}
}

function openSearch(){
  $('search-overlay').classList.add('open');
  $('search-q').value='';
  $('search-results').innerHTML='';
  setTimeout(()=>$('search-q').focus(),50);
  ensureSearchIndex();
}
function closeSearch(){$('search-overlay').classList.remove('open');hideWikiComplete();}

function runSearch(q){
  q=q.trim().toLowerCase();
  const res=$('search-results');
  if(!q){res.innerHTML='';return;}
  const hl=s=>s.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<mark>${m}</mark>`);

  const titleHits=[];
  const ftHits=[];
  const seen=new Set();

  tree.forEach(p=>{
    const inTitle=p.title.toLowerCase().includes(q)||(p.excerpt||'').toLowerCase().includes(q);
    if(inTitle){titleHits.push({p,ft:false});seen.add(p.path);}
  });

  if(searchIndex){
    tree.forEach(p=>{
      if(seen.has(p.path)) return;
      const content=searchIndex[p.path]||searchIndex[`docs/${p.path}.md`]||'';
      if(content.toLowerCase().includes(q)){ftHits.push({p,ft:true});seen.add(p.path);}
    });
  }

  const hits=[...titleHits,...ftHits].slice(0,12);
  if(!hits.length){res.innerHTML=`<div class="sr-empty">${t('search')} — no results</div>`;return;}
  res.innerHTML=hits.map(({p,ft})=>`
    <div class="sr-item" onclick="closeSearch();openPage(${JSON.stringify(p).replace(/"/g,'&quot;')})">
      <div class="sr-title">${hl(p.title)}${ft?`<span class="sr-ft-badge">${t('full_text')}</span>`:''}</div>
      <div class="sr-excerpt">${hl(p.excerpt||p.path)}</div>
    </div>`).join('');
}

function searchKey(e){
  if(e.key==='Escape') closeSearch();
}

async function fetchHistory(){

      commits=raw.map(c=>({sha:c.id,short:c.id.slice(0,7),message:c.message.split('\n')[0],author:c.author_name,date:c.committed_date}));

  try{

      content=b64dec(d.content.replace(/\n/g,''));
    } else {
      const d=await ghFetch(`contents/${currentPath}?ref=${sha}`);

async function restoreVersion(content){

}

// ── Wiki autocomplete ──
function getOrCreateWikiComplete(){
  let el=document.getElementById('wiki-complete');
  if(!el){
    el=document.createElement('div');
    el.id='wiki-complete';
    el.style.display='none';
    document.body.appendChild(el);
  }
  return el;
}

function hideWikiComplete(){
  const el=document.getElementById('wiki-complete');
  if(el) el.style.display='none';
  wikiCompleteIdx=-1;
  wikiCompleteItems=[];
}

function insertWikiLink(title){
  const ta=$('editor');
  const pos=ta.selectionStart;
  const before=ta.value.slice(0,pos);
  const m=before.match(/\[\[([^\]]*)$/);
  if(!m) return;
  const start=pos-m[0].length;
  taInsert(ta,`[[${title}]]`,start,pos);
  ta.dispatchEvent(new Event('input'));
  hideWikiComplete();
}

function initWikiAutocomplete(){
  const ta=$('editor');
  if(!ta) return;
  ta.addEventListener('keyup',e=>{
    if(['ArrowUp','ArrowDown','Enter','Escape'].includes(e.key)) return;
    const pos=ta.selectionStart;
    const before=ta.value.slice(0,pos);
    const m=before.match(/\[\[([^\]]{0,40})$/);
    if(!m){hideWikiComplete();return;}
    const q=m[1].toLowerCase();
    const matches=tree.filter(p=>p.title.toLowerCase().includes(q)).slice(0,8);
    if(!matches.length){hideWikiComplete();return;}
    wikiCompleteItems=matches;
    wikiCompleteIdx=-1;
    const wrap=$('editor-wrap');
    const rect=wrap.getBoundingClientRect();
    const el=getOrCreateWikiComplete();
    el.style.left=rect.left+'px';
    el.style.top=(rect.bottom-2)+'px';
    el.style.display='block';
    el.innerHTML=matches.map((p,i)=>`<div class="wc-item" data-idx="${i}" onmousedown="event.preventDefault();insertWikiLink(${JSON.stringify(p.title)})">${escHtml(p.title)}</div>`).join('');
  });
  ta.addEventListener('keydown',e=>{
    const el=document.getElementById('wiki-complete');
    if(!el||el.style.display==='none') return;
    if(e.key==='ArrowDown'){e.preventDefault();wikiCompleteIdx=Math.min(wikiCompleteIdx+1,wikiCompleteItems.length-1);updateWikiActive();}
    else if(e.key==='ArrowUp'){e.preventDefault();wikiCompleteIdx=Math.max(wikiCompleteIdx-1,0);updateWikiActive();}
    else if(e.key==='Enter'&&wikiCompleteIdx>=0){e.preventDefault();insertWikiLink(wikiCompleteItems[wikiCompleteIdx].title);}
    else if(e.key==='Escape'){hideWikiComplete();}
  });
}

function updateWikiActive(){
  const items=document.querySelectorAll('#wiki-complete .wc-item');
  items.forEach((el,i)=>el.classList.toggle('active',i===wikiCompleteIdx));
}

async function saveSettings(){
  const pw=$('m-pw').value;
  const token=$('m-token').value.trim();
  if(!token&&!localStorage.getItem('wn_enc_token')){
    toast('Paste your Personal Access Token first');
    return;
  }
  const activeToken=token||cfg.token||'';
  const hasPwHash=!!cfg.edit_password_hash;
  if(pw){
    // Password supplied — encrypt token with it
    localStorage.setItem('wn_enc_token',encrypt(activeToken,pw));
    cfg.token=activeToken;
    unlocked=true;
  }else if(!hasPwHash){
    // No password configured — store as plaintext (encrypt with empty key returns str)
    localStorage.setItem('wn_enc_token',activeToken);
    cfg.token=activeToken;
    unlocked=true;
  }else if(token){
    // New token entered but password required and not entered — refuse silently dropping it
    toast(t('password_hint')||'Enter your password to save the token');
    return;
  }
  // lang preference is the only user-local thing we persist
  localStorage.setItem('wn_cfg',JSON.stringify({lang:cfg.lang}));
  closeModal();
  applyI18n();
  loadTree();
}

  queued:     {dot:'🟡',label:'Queued',      color:'#BA7517'},
  success:    {dot:'🟢',label:'Deployed',    color:'#1a7f37'},
  failure:    {dot:'🔴',label:'Failed',      color:'#cf222e'},
  cancelled:  {dot:'⚪',label:'Cancelled',   color:'var(--text3)'},
};

async function fetchLatestRun(){
  if(!cfg.owner||!cfg.repo||!cfg.token) return null;
  try{
    if(cfg.provider==='gitlab'){
      const runs=await glFetch('pipelines?per_page=3');
      const run=watchingRunId
        ?(runs.find(r=>r.id===watchingRunId)||runs[0]||null)
        :(runs[0]||null);
      return run?normalizeRun(run):null;
    }
    const data=await ghFetch('actions/runs?per_page=3');
    if(watchingRunId){
      return data.workflow_runs?.find(r=>r.id===watchingRunId)
          || data.workflow_runs?.[0]
          || null;
    }
    return data.workflow_runs?.[0]||null;
  }catch{return null;}
}

function renderStatus(run){
  const el=$('actions-status');
  if(!run){el.style.display='none';return;}
  const conclusion=run.conclusion||run.status;
  const s=statusCfg[conclusion]||{dot:'⚪',label:conclusion,color:'var(--text3)'};
  el.style.display='flex';
  el.style.color=s.color;
  el.style.borderColor=s.color==='var(--text3)'?'var(--border)':s.color+'44';
  el.href=run.html_url;
  el.innerHTML=`<span>${s.dot}</span><span>${s.label}</span>`;
}

async function pollActions(onDone,onFail){
  clearTimeout(pollTimer);
  const run=await fetchLatestRun();
  renderStatus(run);
  if(!run) return;
  const active=run.status==='in_progress'||run.status==='queued';
  if(active){
    pollTimer=setTimeout(()=>pollActions(onDone,onFail),5000);
  } else {
    watchingRunId=null;
    if(run.conclusion==='success'){if(onDone) onDone();}
    else{if(onFail) onFail(run.conclusion);}
    pollTimer=setTimeout(()=>pollActions(null,null),30000);
  }
}

async function watchDeploy(savedPath){
  toast('Saved — waiting for Actions...');
  const savedRel=savedPath.replace(/^docs\//,'').replace(/\.md$/,'');
  // Cancel indicators from any previous deploy, mark this file as pending
  clearAllTreeStatuses();
  setTreeRowStatus(savedRel,'pending');
  // Each call gets a unique generation; stale loops self-cancel when gen changes
  const gen=++watchDeployGen;
  const before=await fetchLatestRun();
  const beforeId=before?.id||null;
  async function waitForNewRun(attempts=0){
    if(gen!==watchDeployGen){setTreeRowStatus(savedRel,null);return;} // superseded
    if(attempts>20){setTreeRowStatus(savedRel,null);pollActions(null,null);return;}
    const run=await fetchLatestRun();
    if(run&&run.id!==beforeId){
      watchingRunId=run.id;
      renderStatus(run);
      pollActions(
        ()=>{
          if(gen===watchDeployGen){
            setTreeRowStatus(savedRel,'success');
            setTimeout(()=>setTreeRowStatus(savedRel,null),3500);
          }
          toast('✓ Deploy complete');
          loadTree();
        },
        ()=>{
          if(gen===watchDeployGen) setTreeRowStatus(savedRel,'failure');
          toast('✗ Deploy failed');
        }
      );
    } else {
      setTimeout(()=>waitForNewRun(attempts+1),4000);
    }
  }
  setTimeout(()=>waitForNewRun(),5000);
}

// ── Editor keyboard shortcuts (Tab indent, Ctrl+B/I) ──
function initEditorShortcuts(){
  const ta=$('editor');
  if(!ta) return;
  ta.addEventListener('keydown',e=>{
    if(!$('editor-wrap').classList.contains('edit-active')) return;
    // Tab → insert 2 spaces (prevent focus shift)
    if(e.key==='Tab'&&!e.metaKey&&!e.ctrlKey&&!e.altKey){
      e.preventDefault();
      const s=ta.selectionStart,end=ta.selectionEnd;
      taInsert(ta,'  ',s,end);
      ta.dispatchEvent(new Event('input'));
      return;
    }
    // Ctrl/Cmd+B → Bold
    if((e.metaKey||e.ctrlKey)&&e.key==='b'){
      e.preventDefault();
      fmt('**','**','bold text');
      return;
    }
    // Ctrl/Cmd+I → Italic
    if((e.metaKey||e.ctrlKey)&&e.key==='i'){
      e.preventDefault();
      fmt('_','_','italic text');
      return;
    }
  });
}

// Initialize wiki autocomplete after DOM ready
initEditorShortcuts();
initWikiAutocomplete();

init();
</script>
