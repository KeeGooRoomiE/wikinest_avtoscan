# Copy to inventory.ini (gitignored) and fill in real values.
# ansible_port is the NAT-forwarded high port from the provider
# (see VM_SETUP.md — currently 26503 -> internal 22), NOT sshd's own
# Port directive, which stays the Ubuntu default (22) unless you know
# otherwise for your VM.

[wikinest]
vm ansible_host=203.0.113.10 ansible_port=26503 ansible_user=admin1
# Or, if a matching Host block already exists in ~/.ssh/config with the
# right IdentityFile (recommended — avoids duplicating connection details):
#   vm ansible_host=wikinest-vm

[wikinest:vars]
# ansible_become_pass=...   # sudo password, skips the --ask-become-pass prompt
