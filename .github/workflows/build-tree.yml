name: Build tree

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'

permissions:
  contents: write

jobs:
  build-tree:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Pull latest
        run: git pull origin main

      - name: Generate tree.json and search.json
        run: |
          python3 - <<'PYEOF'
          import os, json, re, subprocess

          docs_dir = 'docs'
          tree = []
          search = {}
          folder_meta = {}

          def parse_frontmatter(text):
              meta = {}
              body = text
              m = re.match(r'^---\r?\n([\s\S]*?)\r?\n---\r?\n?', text)
              if m:
                  body = text[len(m.group(0)):]
                  for line in m.group(1).splitlines():
                      kv = re.match(r'^(\w[\w-]*):\s*(.*)$', line)
                      if not kv:
                          continue
                      k, v = kv.group(1), kv.group(2).strip()
                      if v.startswith('['):
                          try:
                              meta[k] = json.loads(v.replace("'", '"'))
                          except Exception:
                              meta[k] = [s.strip() for s in v[1:-1].split(',') if s.strip()]
                      else:
                          meta[k] = v.strip('"\'')
                  if isinstance(meta.get('tags'), str):
                      meta['tags'] = [s.strip() for s in meta['tags'].split(',') if s.strip()]
              return meta, body

          for root, dirs, files in os.walk(docs_dir):
            dirs.sort()
            if '_meta.json' in files:
              meta_path = os.path.join(root, '_meta.json')
              with open(meta_path, encoding='utf-8') as fh:
                try:
                  meta = json.load(fh)
                  rel_dir = os.path.relpath(root, docs_dir).replace('\\', '/')
                  folder_meta[rel_dir] = meta
                except Exception:
                  pass

            for f in sorted(files):
              if not f.endswith('.md') or f.startswith('_'):
                continue
              full = os.path.join(root, f)
              rel  = os.path.relpath(full, docs_dir).replace('\\', '/')
              path = rel[:-3]
              parts = path.split('/')

              with open(full, encoding='utf-8') as fh:
                raw_content = fh.read()

              fm_meta, body = parse_frontmatter(raw_content)
              tags = fm_meta.get('tags', [])
              author = fm_meta.get('author', '')
              is_counting = fm_meta.get('isCounting', 'false').lower() not in ('false', '0', 'no', '') if isinstance(fm_meta.get('isCounting'), str) else bool(fm_meta.get('isCounting', False))

              title = parts[-1].replace('-', ' ').replace('_', ' ').capitalize()
              excerpt = ''
              in_code_block = False
              for line in body.splitlines():
                stripped = line.strip()
                if stripped.startswith('```') or stripped.startswith('~~~'):
                  in_code_block = not in_code_block
                  continue
                if in_code_block:
                  continue
                if stripped.startswith('# '):
                  title = stripped[2:].strip()
                  break
                elif stripped and not stripped.startswith('#') and not excerpt:
                  excerpt = stripped[:140]

              folder_titles = {}
              for i in range(len(parts) - 1):
                folder_path = '/'.join(parts[:i+1])
                meta = folder_meta.get(folder_path, {})
                folder_titles[parts[i]] = meta.get('title', parts[i].replace('-', ' ').replace('_', ' ').capitalize())

              updated_at = subprocess.run(
                ['git', 'log', '-1', '--format=%cI', '--', full],
                capture_output=True, text=True
              ).stdout.strip() or None

              entry = {
                'path': path,
                'title': title,
                'excerpt': excerpt,
                'parts': parts,
                'folder_titles': folder_titles,
                'updated_at': updated_at,
                'tags': tags,
                'author': author,
                'isCounting': is_counting,
              }
              if 'glossary' in parts:
                import re as _re
                entry['termCount'] = len(_re.findall(r'^\|\s*\*\*', body, _re.MULTILINE))
              if 'incidents' in parts and parts[-1] == 'index':
                import re as _re
                count = 0
                expect = None  # 'header' then 'sep' then data rows
                for line in body.splitlines():
                  if _re.match(r'^##\s', line):
                    expect = 'header'
                    continue
                  if not line.startswith('|'):
                    continue
                  if expect == 'header':
                    expect = 'sep'
                    continue
                  if expect == 'sep':
                    expect = None
                    continue
                  count += 1
                entry['incidentCount'] = count
              tree.append(entry)

              # Store full content in search index keyed by path (without docs/ prefix)
              search[path] = raw_content

          def page_sort_key(entry):
              parts = entry['parts']
              key = []
              for depth in range(len(parts)):
                  parent = '/'.join(parts[:depth]) if depth > 0 else '.'
                  part = parts[depth]
                  meta = folder_meta.get(parent, {})
                  pages_order = meta.get('pages', [])
                  if part in pages_order:
                      key.append((0, pages_order.index(part), part))
                  else:
                      key.append((1, 0, part))
              return key

          tree.sort(key=page_sort_key)

          # Add _folder marker entries for directories that have _meta.json but no pages
          def folder_marker_key(item):
              rd = item[0]
              parts = rd.split('/')
              key = []
              for i in range(len(parts)):
                  parent = '/'.join(parts[:i]) if i > 0 else '.'
                  part = parts[i]
                  m = folder_meta.get(parent, {})
                  pages_ord = m.get('pages', [])
                  if part in pages_ord:
                      key.append((0, pages_ord.index(part), part))
                  else:
                      key.append((1, 0, part))
              return key

          page_paths = {e['path'] for e in tree}
          for rel_dir, meta in sorted(folder_meta.items(), key=folder_marker_key):
            if rel_dir == '.':
              continue
            parts = rel_dir.split('/')
            has_child = any(p == rel_dir or p.startswith(rel_dir + '/') for p in page_paths)
            parent_dir = '/'.join(parts[:-1]) if len(parts) > 1 else '.'
            in_parent_pages = parts[-1] in folder_meta.get(parent_dir, {}).get('pages', [])
            if not has_child or in_parent_pages:
              ft = {}
              for i in range(len(parts) - 1):
                parent = '/'.join(parts[:i+1])
                m = folder_meta.get(parent, {})
                ft[parts[i]] = m.get('title', parts[i].replace('-',' ').replace('_',' ').capitalize())
              tree.append({
                '_folder': True,
                'path': rel_dir,
                'title': meta.get('title', parts[-1].replace('-',' ').replace('_',' ').capitalize()),
                'parts': parts,
                'folder_titles': ft,
              })

          with open('tree.json', 'w', encoding='utf-8') as f:
            json.dump(tree, f, ensure_ascii=False, indent=2)
          print(f'tree.json: {len(tree)} pages')

          with open('search.json', 'w', encoding='utf-8') as f:
            json.dump(search, f, ensure_ascii=False)
          print(f'search.json: {len(search)} entries')
          PYEOF

      - name: Commit tree.json and search.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tree.json search.json
          git diff --staged --quiet || git commit -m "chore: update tree.json"
          git push
