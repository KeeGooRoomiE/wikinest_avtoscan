name: Build tree

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'

permissions:
  contents: write

jobs:
  build-tree:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Pull latest
        run: git pull origin main

      - name: Generate tree.json
        run: |
          python3 - <<'PYEOF'
          import os, json, subprocess

          docs_dir = 'docs'
          tree = []
          folder_meta = {}

          for root, dirs, files in os.walk(docs_dir):
            dirs.sort()
            if '_meta.json' in files:
              meta_path = os.path.join(root, '_meta.json')
              with open(meta_path, encoding='utf-8') as fh:
                try:
                  meta = json.load(fh)
                  rel_dir = os.path.relpath(root, docs_dir).replace('\\', '/')
                  folder_meta[rel_dir] = meta
                except Exception:
                  pass

            for f in sorted(files):
              if not f.endswith('.md') or f.startswith('_'):
                continue
              full = os.path.join(root, f)
              rel  = os.path.relpath(full, docs_dir).replace('\\', '/')
              path = rel[:-3]
              parts = path.split('/')
              title = parts[-1].replace('-', ' ').replace('_', ' ').capitalize()
              excerpt = ''
              with open(full, encoding='utf-8') as fh:
                for line in fh:
                  line = line.strip()
                  if line.startswith('# '):
                    title = line[2:].strip()
                  elif line and not line.startswith('#') and not excerpt:
                    excerpt = line[:140]
              folder_titles = {}
              for i in range(len(parts) - 1):
                folder_path = '/'.join(parts[:i+1])
                meta = folder_meta.get(folder_path, {})
                folder_titles[parts[i]] = meta.get('title', parts[i].replace('-', ' ').replace('_', ' ').capitalize())
              updated_at = subprocess.run(
                ['git', 'log', '-1', '--format=%cI', '--', full],
                capture_output=True, text=True
              ).stdout.strip() or None
              tree.append({
                'path': path,
                'title': title,
                'excerpt': excerpt,
                'parts': parts,
                'folder_titles': folder_titles,
                'updated_at': updated_at
              })

          with open('tree.json', 'w', encoding='utf-8') as f:
            json.dump(tree, f, ensure_ascii=False, indent=2)
          print(f'tree.json: {len(tree)} pages')
          PYEOF

      - name: Commit tree.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tree.json
          git diff --staged --quiet || git commit -m "chore: update tree.json"
          git push