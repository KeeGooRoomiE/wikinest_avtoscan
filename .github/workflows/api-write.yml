name: API Write

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'put_file | delete_file | append_row'
        required: true
        type: string
      path:
        description: 'File path relative to repo root'
        required: true
        type: string
      content:
        description: 'Base64-encoded file content (put_file only)'
        required: false
        type: string
        default: ''
      message:
        description: 'Commit message'
        required: true
        type: string
      section_name:
        description: 'Section heading text (append_row only)'
        required: false
        type: string
        default: ''
      new_row:
        description: 'Markdown table row to append (append_row only)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  write:
    runs-on: ubuntu-latest
    steps:
      - name: Execute file operation
        run: |
          python3 - <<'PYEOF'
          import os, json, re, base64, urllib.request, urllib.error

          op           = os.environ['OP']
          path         = os.environ['FILE_PATH']
          content      = os.environ['CONTENT']
          message      = os.environ['MESSAGE']
          section_name = os.environ.get('SECTION_NAME', '')
          new_row      = os.environ.get('NEW_ROW', '')
          token        = os.environ['GH_PAT']
          repo         = os.environ['GITHUB_REPOSITORY']

          api = f'https://api.github.com/repos/{repo}/contents/{path}'
          headers = {
            'Authorization': f'Bearer {token}',
            'Content-Type':  'application/json',
            'Accept':        'application/vnd.github.v3+json',
          }

          def gh_get():
            req = urllib.request.Request(api, headers=headers)
            with urllib.request.urlopen(req) as r:
              return json.load(r)

          if op == 'put_file':
            sha = None
            try:
              sha = gh_get().get('sha')
            except urllib.error.HTTPError as e:
              if e.code != 404:
                raise
            body = {'message': message, 'content': content}
            if sha:
              body['sha'] = sha
            data = json.dumps(body).encode()
            req = urllib.request.Request(api, data=data, headers=headers, method='PUT')
            with urllib.request.urlopen(req):
              print(f'Written: {path}')

          elif op == 'delete_file':
            sha = None
            try:
              sha = gh_get().get('sha')
            except urllib.error.HTTPError as e:
              if e.code != 404:
                raise
            if not sha:
              print(f'File not found, skipping delete: {path}')
            else:
              body = {'message': message, 'sha': sha}
              data = json.dumps(body).encode()
              req = urllib.request.Request(api, data=data, headers=headers, method='DELETE')
              with urllib.request.urlopen(req):
                print(f'Deleted: {path}')

          elif op == 'append_row':
            file_data = gh_get()
            sha = file_data['sha']
            md = base64.b64decode(file_data['content'].replace('\n', '')).decode('utf-8')

            lines = md.split('\n')
            sec_idx = -1
            for i, line in enumerate(lines):
              m = re.match(r'^##\s+(.+)', line)
              if m and m.group(1).strip() == section_name:
                sec_idx = i
                break
            if sec_idx < 0:
              raise ValueError(f'Section not found: {section_name!r}')

            last_table = -1
            for i in range(sec_idx + 1, len(lines)):
              if re.match(r'^##\s', lines[i]):
                break
              if lines[i].startswith('|'):
                last_table = i
            insert_at = last_table + 1 if last_table >= 0 else sec_idx + 1
            lines.insert(insert_at, new_row)

            new_content = base64.b64encode('\n'.join(lines).encode('utf-8')).decode('ascii')
            body = {'message': message, 'content': new_content, 'sha': sha}
            data = json.dumps(body).encode()
            req = urllib.request.Request(api, data=data, headers=headers, method='PUT')
            with urllib.request.urlopen(req):
              print(f'Appended to {section_name!r} in {path}')

          else:
            raise ValueError(f'Unknown operation: {op}')
          PYEOF
        env:
          OP:           ${{ inputs.operation }}
          FILE_PATH:    ${{ inputs.path }}
          CONTENT:      ${{ inputs.content }}
          MESSAGE:      ${{ inputs.message }}
          SECTION_NAME: ${{ inputs.section_name }}
          NEW_ROW:      ${{ inputs.new_row }}
          GH_PAT:       ${{ secrets.GH_PAT }}
