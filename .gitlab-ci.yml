# GitLab CI — эквивалент трёх GitHub Actions:
#   build-tree.yml  →  build-tree
#   api-write.yml   →  api-write
#   deploy.yml      →  pages
#
# Переменные CI/CD (GitLab → Settings → CI/CD → Variables):
#   GL_PAT — project/personal access token с правами api + write_repository

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

default:
  image: python:3.12-slim

variables:
  GIT_DEPTH: 0  # нужна полная история для updated_at

stages:
  - build
  - deploy

# ── build-tree: регенерация tree.json и search.json при изменении docs/ ──────
build-tree:
  stage: build
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "trigger"'
      changes:
        - docs/**/*
  before_script:
    - git config user.name  "gitlab-ci[bot]"
    - git config user.email "gitlab-ci[bot]@noreply.gitlab.com"
    - git remote set-url origin "https://oauth2:${GL_PAT}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
  script:
    - python3 - <<'PYEOF'
import os, json, re, subprocess

docs_dir = 'docs'
tree = []
search = {}
folder_meta = {}

def parse_frontmatter(text):
    meta = {}
    body = text
    m = re.match(r'^---\r?\n([\s\S]*?)\r?\n---\r?\n?', text)
    if m:
        body = text[len(m.group(0)):]
        for line in m.group(1).splitlines():
            kv = re.match(r'^(\w[\w-]*):\s*(.*)$', line)
            if not kv:
                continue
            k, v = kv.group(1), kv.group(2).strip()
            if v.startswith('['):
                try:
                    meta[k] = json.loads(v.replace("'", '"'))
                except Exception:
                    meta[k] = [s.strip() for s in v[1:-1].split(',') if s.strip()]
            else:
                meta[k] = v.strip('"\'')
        if isinstance(meta.get('tags'), str):
            meta['tags'] = [s.strip() for s in meta['tags'].split(',') if s.strip()]
    return meta, body

for root, dirs, files in os.walk(docs_dir):
    dirs.sort()
    if '_meta.json' in files:
        meta_path = os.path.join(root, '_meta.json')
        with open(meta_path, encoding='utf-8') as fh:
            try:
                meta = json.load(fh)
                rel_dir = os.path.relpath(root, docs_dir).replace('\\', '/')
                folder_meta[rel_dir] = meta
            except Exception:
                pass

    for f in sorted(files):
        if not f.endswith('.md') or f.startswith('_'):
            continue
        full = os.path.join(root, f)
        rel  = os.path.relpath(full, docs_dir).replace('\\', '/')
        path = rel[:-3]
        parts = path.split('/')

        with open(full, encoding='utf-8') as fh:
            raw_content = fh.read()

        fm_meta, body = parse_frontmatter(raw_content)
        tags   = fm_meta.get('tags', [])
        author = fm_meta.get('author', '')
        is_counting = fm_meta.get('isCounting', 'false').lower() not in ('false', '0', 'no', '') \
            if isinstance(fm_meta.get('isCounting'), str) \
            else bool(fm_meta.get('isCounting', False))

        title = parts[-1].replace('-', ' ').replace('_', ' ').capitalize()
        excerpt = ''
        in_code_block = False
        for line in body.splitlines():
            stripped = line.strip()
            if stripped.startswith('```') or stripped.startswith('~~~'):
                in_code_block = not in_code_block
                continue
            if in_code_block:
                continue
            if stripped.startswith('# '):
                title = stripped[2:].strip()
                break
            elif stripped and not stripped.startswith('#') and not excerpt:
                excerpt = stripped[:140]

        folder_titles = {}
        for i in range(len(parts) - 1):
            folder_path = '/'.join(parts[:i+1])
            meta = folder_meta.get(folder_path, {})
            folder_titles[parts[i]] = meta.get('title', parts[i].replace('-', ' ').replace('_', ' ').capitalize())

        updated_at = subprocess.run(
            ['git', 'log', '-1', '--format=%cI', '--', full],
            capture_output=True, text=True
        ).stdout.strip() or None

        entry = {
            'path': path, 'title': title, 'excerpt': excerpt,
            'parts': parts, 'folder_titles': folder_titles,
            'updated_at': updated_at, 'tags': tags, 'author': author,
            'isCounting': is_counting,
        }
        if 'glossary' in parts:
            import re as _re
            entry['termCount'] = len(_re.findall(r'^\|\s*\*\*', body, _re.MULTILINE))
        if 'incidents' in parts and parts[-1] == 'index':
            import re as _re
            count = 0
            expect = None  # 'header' then 'sep' then data rows
            for line in body.splitlines():
                if _re.match(r'^##\s', line):
                    expect = 'header'
                    continue
                if not line.startswith('|'):
                    continue
                if expect == 'header':
                    expect = 'sep'
                    continue
                if expect == 'sep':
                    expect = None
                    continue
                count += 1
            entry['incidentCount'] = count
        tree.append(entry)

        search[path] = raw_content

def page_sort_key(entry):
    parts = entry['parts']
    key = []
    for depth in range(len(parts)):
        parent = '/'.join(parts[:depth]) if depth > 0 else '.'
        part = parts[depth]
        meta = folder_meta.get(parent, {})
        pages_order = meta.get('pages', [])
        if part in pages_order:
            key.append((0, pages_order.index(part), part))
        else:
            key.append((1, 0, part))
    return key

tree.sort(key=page_sort_key)

# Add _folder marker entries for directories that have _meta.json but no pages
page_paths = {e['path'] for e in tree}
for rel_dir, meta in sorted(folder_meta.items()):
    if rel_dir == '.':
        continue
    parts = rel_dir.split('/')
    has_child = any(p == rel_dir or p.startswith(rel_dir + '/') for p in page_paths)
    if not has_child:
        ft = {}
        for i in range(len(parts) - 1):
            parent = '/'.join(parts[:i+1])
            m = folder_meta.get(parent, {})
            ft[parts[i]] = m.get('title', parts[i].replace('-',' ').replace('_',' ').capitalize())
        tree.append({
            '_folder': True,
            'path': rel_dir,
            'title': meta.get('title', parts[-1].replace('-',' ').replace('_',' ').capitalize()),
            'parts': parts,
            'folder_titles': ft,
        })

with open('tree.json', 'w', encoding='utf-8') as f:
    json.dump(tree, f, ensure_ascii=False, indent=2)
print(f'tree.json: {len(tree)} pages')

with open('search.json', 'w', encoding='utf-8') as f:
    json.dump(search, f, ensure_ascii=False)
print(f'search.json: {len(search)} entries')
PYEOF
    - git add tree.json search.json
    - git diff --staged --quiet || git commit -m "chore: update tree.json [skip ci]"
    - git push origin HEAD:$CI_DEFAULT_BRANCH

# ── api-write: запись/удаление файла через GitLab Files API ──────────────────
# Запуск через pipeline trigger:
#   curl -X POST https://gitlab.com/api/v4/projects/<ID>/trigger/pipeline \
#     -F token=<TRIGGER_TOKEN> -F ref=main \
#     -F "variables[OPERATION]=put_file" \
#     -F "variables[FILE_PATH]=docs/example.md" \
#     -F "variables[CONTENT]=<base64>" \
#     -F "variables[MESSAGE]=docs: update example"
#   Для append_row вместо CONTENT передавать SECTION_NAME и NEW_ROW.
api-write:
  stage: build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger" && $OPERATION != null'
  script:
    - python3 - <<'PYEOF'
import os, json, re, base64, urllib.request, urllib.error, urllib.parse

op           = os.environ['OPERATION']       # put_file | delete_file | append_row
path         = os.environ['FILE_PATH']
content      = os.environ.get('CONTENT', '')
message      = os.environ['MESSAGE']
section_name = os.environ.get('SECTION_NAME', '')
new_row      = os.environ.get('NEW_ROW', '')
token        = os.environ['GL_PAT']
project      = os.environ['CI_PROJECT_ID']
server       = os.environ.get('CI_SERVER_URL', 'https://gitlab.com')

encoded_path = urllib.parse.quote(path, safe='')
api  = f'{server}/api/v4/projects/{project}/repository/files/{encoded_path}'
hdrs = {'PRIVATE-TOKEN': token, 'Content-Type': 'application/json'}

def gl_req(url, data=None, method='GET'):
    req = urllib.request.Request(url, data=data, headers=hdrs, method=method)
    return urllib.request.urlopen(req)

if op == 'put_file':
    exists = True
    try:
        gl_req(f'{api}?ref=main')
    except urllib.error.HTTPError as e:
        if e.code == 404:
            exists = False
        else:
            raise
    body = json.dumps({
        'branch': 'main', 'commit_message': message,
        'content': content, 'encoding': 'base64',
    }).encode()
    gl_req(api, data=body, method='PUT' if exists else 'POST')
    print(f'Written: {path}')

elif op == 'delete_file':
    body = json.dumps({'branch': 'main', 'commit_message': message}).encode()
    try:
        gl_req(api, data=body, method='DELETE')
        print(f'Deleted: {path}')
    except urllib.error.HTTPError as e:
        if e.code == 404:
            print(f'File not found, skipping: {path}')
        else:
            raise

elif op == 'append_row':
    with gl_req(f'{api}?ref=main') as r:
        file_data = json.load(r)
    md = base64.b64decode(file_data['content']).decode('utf-8')

    lines = md.split('\n')
    sec_idx = -1
    for i, line in enumerate(lines):
        m = re.match(r'^##\s+(.+)', line)
        if m and m.group(1).strip() == section_name:
            sec_idx = i
            break
    if sec_idx < 0:
        raise ValueError(f'Section not found: {section_name!r}')

    last_table = -1
    for i in range(sec_idx + 1, len(lines)):
        if re.match(r'^##\s', lines[i]):
            break
        if lines[i].startswith('|'):
            last_table = i
    lines.insert(last_table + 1 if last_table >= 0 else sec_idx + 1, new_row)

    new_content = base64.b64encode('\n'.join(lines).encode('utf-8')).decode('ascii')
    body = json.dumps({
        'branch': 'main', 'commit_message': message,
        'content': new_content, 'encoding': 'base64',
    }).encode()
    gl_req(api, data=body, method='PUT')
    print(f'Appended to {section_name!r} in {path}')

else:
    raise ValueError(f'Unknown operation: {op}')
PYEOF

# ── pages: деплой на GitLab Pages ────────────────────────────────────────────
# GitLab Pages требует артефакт в директории public/.
# Срабатывает на любой пуш в main (tree.json, docs, front-end файлы).
pages:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "trigger"'
  script:
    - mkdir -p public
    - cp -r . public/
    - rm -rf public/public
  artifacts:
    paths:
      - public
