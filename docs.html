  const newRel=$('m-rename').value.trim().replace(/\.md$/,'');
  if(!newRel) return;
  if(!/^[a-zA-Z0-9_\-][a-zA-Z0-9_\-\/]*$/.test(newRel)){toast('Invalid path — use letters, numbers, hyphens, underscores and slashes only');return;}
  const oldPath=currentPath;
  const newPath=`docs/${newRel}.md`;
  if(newPath===oldPath){closeModal();return;}
  const ok=await requireUnlock();
  if(!ok) return;
  closeModal();
  try{
    const content=await fetchDoc(oldPath);
    await apiPutFile(newPath,`docs: rename ${oldPath} → ${newPath}`,content);
    await apiDeleteFile(oldPath,`docs: rename ${oldPath} → ${newPath}`);
    currentPath=null;originalContent=null;editorDirty=false;
    $('panels').classList.remove('split');
    $('view-wrap').style.display='none';
    $('btn-edit').style.display='none';
    $('btn-delete').style.display='none';
    $('btn-rename').style.display='none';
    $('btn-append').style.display='none';
    $('btn-history').style.display='none';
    $('breadcrumb').innerHTML='';
    const tocRen=$('toc');if(tocRen)tocRen.style.display='none';
    // Real entry from the rebuilt tree.json — title comes from the file's
    // actual H1/frontmatter via the backend, not a titlecased guess from the
    // new slug (which could disagree with the real title).
    await loadTree();
    toast(t('saved'));
    const renamedPage=tree.find(p=>p.path===newRel);
    if(renamedPage) openPage(renamedPage);
  }catch(e){toast(`Error: ${e.message}`);}
}


// ── Quick Append (glossary / incidents) ──
function sanitizeMd(s){return(s||'').replace(/\|/g,'\\|').replace(/\n/g,' ').trim();}

function _parseSectionsFromMd(md){
  const sections=[];
  for(const line of md.split('\n')){
    const m=line.match(/^##\s+(.+)/);
    if(m) sections.push(m[1].trim());
  }
  return sections;
}

function _getIncidentCol4Label(sectionName){
  const map={'Техническая поддержка':'ТС / Клиент','Отдел продаж':'Клиент','Отдел сервиса':'ТС / Клиент','Бухгалтерия':'Контрагент'};
  return map[sectionName]||'Доп. инфо';
}

function updateIncidentCol4(selectEl){
  const lbl=$('app-col4-lbl');
  if(lbl) lbl.textContent=_getIncidentCol4Label(selectEl.value);
}

function _appendRowToSection(mdText, sectionName, newRow){
  const lines=mdText.split('\n');
  let secIdx=-1;
  for(let i=0;i<lines.length;i++){
    const m=lines[i].match(/^##\s+(.+)/);
    if(m&&m[1].trim()===sectionName){secIdx=i;break;}
  }
  if(secIdx<0) return mdText;
  let lastTableLine=-1;
  for(let i=secIdx+1;i<lines.length;i++){
    if(lines[i].match(/^##\s/)) break;
    if(lines[i].startsWith('|')) lastTableLine=i;
  }
  if(lastTableLine<0) lines.splice(secIdx+1,0,newRow);
  else lines.splice(lastTableLine+1,0,newRow);
  return lines.join('\n');
}

async function openAppendModal(){
  const isGlossary=currentPath==='docs/glossary/index.md';
  const isIncidents=currentPath==='docs/incidents/index.md';
  if(!isGlossary&&!isIncidents) return;
  await ensureSearchIndex();
  const relPath=currentPath.replace('docs/','').replace(/\.md$/,'');
  const md=searchIndex[relPath]||'';
  const sections=_parseSectionsFromMd(md);
  if(!sections.length){toast('Не удалось определить разделы',true);return;}
  $('modal-title').textContent='Добавить запись';
  if(isGlossary){
    $('modal-body').innerHTML=`
      <div class="field"><label>Раздел</label>
        <select id="app-section">${sections.map(s=>`<option value="${escHtml(s)}">${escHtml(s)}</option>`).join('')}</select></div>
      <div class="field"><label>Термин</label><input id="app-f1" placeholder="Термин"></div>
      <div class="field"><label>Определение</label><input id="app-f2" placeholder="Определение"></div>
      <div class="field"><label>Пример <span style="opacity:.5">(необязательно)</span></label><input id="app-f3" placeholder="—"></div>`;
  }else{
    const today=new Date().toISOString().slice(0,10);
    const col4Label=_getIncidentCol4Label(sections[0]);
    $('modal-body').innerHTML=`
      <div class="field"><label>Раздел</label>
        <select id="app-section" onchange="updateIncidentCol4(this)">${sections.map(s=>`<option value="${escHtml(s)}">${escHtml(s)}</option>`).join('')}</select></div>
      <div class="field"><label>Дата</label><input id="app-f1" value="${today}"></div>
      <div class="field"><label>Инцидент</label><input id="app-f2" placeholder="Краткое название"></div>
      <div class="field"><label>Описание</label><input id="app-f3" placeholder="Подробное описание"></div>
      <div class="field"><label id="app-col4-lbl">${escHtml(col4Label)}</label><input id="app-f4" placeholder="—"></div>
      <div class="field"><label>Решение <span style="opacity:.5">(необязательно)</span></label><input id="app-f5" placeholder="—"></div>`;
  }
  $('modal-actions').innerHTML=`
    <button onclick="closeModal()">${t('cancel')}</button>
    <button class="btn-primary" onclick="submitAppend()">Добавить</button>`;
  $('modal-overlay').classList.add('open');
  setTimeout(()=>{const el=$('app-f1');if(el)el.focus();},50);
}

async function submitAppend(){
  const isGlossary=currentPath==='docs/glossary/index.md';
  const section=($('app-section')||{}).value;
  if(!section) return;
  let newRow;
  if(isGlossary){
    const term=sanitizeMd($('app-f1').value);
    const def=sanitizeMd($('app-f2').value);
    const ex=sanitizeMd($('app-f3').value)||'—';
    if(!term||!def){toast('Заполните Термин и Определение',true);return;}
    newRow=`| **${term}** | ${def} | ${ex} |`;
  }else{
    const date=sanitizeMd($('app-f1').value)||new Date().toISOString().slice(0,10);
    const inc=sanitizeMd($('app-f2').value);
    const desc=sanitizeMd($('app-f3').value);
    const col4=sanitizeMd($('app-f4').value)||'—';
    const sol=sanitizeMd($('app-f5').value)||'—';
    if(!inc||!desc){toast('Заполните Инцидент и Описание',true);return;}
    newRow=`| ${date} | ${inc} | ${desc} | ${col4} | ${sol} |`;
  }
  closeModal();
  const relPath=currentPath.replace('docs/','').replace(/\.md$/,'');
  try{
    // Send only the tiny row — the backend reads the file and appends server-side
    await apiAppendRow(currentPath,`docs: append entry to ${relPath} (${section})`,section,newRow);
    const freshMd=await fetchDoc(currentPath);
    if(searchIndex) searchIndex[relPath]=freshMd;
    renderView(freshMd);
    toast('Запись добавлена');
  }catch(e){toast(`Ошибка: ${escHtml(e.message)}`,true);}
}

// ── Empty state ──
function showEmpty(){
  $('view-wrap').style.display='none';
  showDashboard();
}

// ── Search ──
async function ensureSearchIndex(){
  // Always fresh, not once-per-session — search.json is a local file the
  // backend already keeps current, not a GitHub raw-CDN fetch worth avoiding.
  // Caching this was the root cause of stale-content bugs (glossary title
  // reverting after "Добавить" — the append rebuilt its view from whatever
  // this held at first load, which could predate a later edit).
  try{
    const r=await fetch('/search.json',{cache:'no-cache'});
    searchIndex=r.ok?await r.json():{};
  }catch{searchIndex={};}
}

function openSearch(){
  $('search-overlay').classList.add('open');
  $('search-q').value='';
  $('search-results').innerHTML='';
  setTimeout(()=>$('search-q').focus(),50);
  ensureSearchIndex();
}
function closeSearch(){$('search-overlay').classList.remove('open');hideWikiComplete();}

function runSearch(q){
  q=q.trim().toLowerCase();
  const res=$('search-results');
  if(!q){res.innerHTML='';return;}
  const hl=s=>s.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<mark>${m}</mark>`);

  const titleHits=[];
  const ftHits=[];
  const seen=new Set();

  tree.forEach(p=>{
    const inTitle=p.title.toLowerCase().includes(q)||(p.excerpt||'').toLowerCase().includes(q);
    if(inTitle){titleHits.push({p,ft:false,excerpt:null});seen.add(p.path);}
  });

  if(searchIndex){
    tree.forEach(p=>{
      if(seen.has(p.path)) return;
      const raw=searchIndex[p.path]||searchIndex[`docs/${p.path}.md`]||'';
      let content=raw;
      let ftExcerpt=null;
      if(p.path==='glossary/index'){
        const terms=(raw.match(/^\|\s*\*\*([^*|]+)\*\*/gm)||[]).map(t=>t.replace(/^\|\s*\*\*/,'').replace(/\*\*/,''));
        content=terms.join('\n');
        ftExcerpt=terms.find(t=>t.toLowerCase().includes(q))||null;
      }
      if(content.toLowerCase().includes(q)){ftHits.push({p,ft:true,excerpt:ftExcerpt});seen.add(p.path);}
    });
  }

  const hits=[...titleHits,...ftHits].slice(0,12);
  if(!hits.length){res.innerHTML=`<div class="sr-empty">${t('search')} — no results</div>`;return;}
  res.innerHTML='';
  hits.forEach(({p,ft,excerpt})=>{
    const div=document.createElement('div');
    div.className='sr-item';
    const ex=excerpt||p.excerpt||'';
    div.innerHTML=`<div class="sr-title">${hl(p.title)}</div>${ex?`<div class="sr-excerpt">${hl(ex)}</div>`:''}`;
    div.onclick=()=>{closeSearch();window._searchHighlight=q;if(p.path==='glossary/index')window._searchHighlightScope='glossary';openPage(p);};
    res.appendChild(div);
  });
}

function searchKey(e){
  if(e.key==='Escape') closeSearch();
}

// ── Page History ──
async function openHistory(){
  if(!currentPath) return;
  $('btn-history').disabled=true;
  const ok=await requireUnlock();
  $('btn-history').disabled=false;
  if(!ok) return;
  $('modal-title').textContent=t('page_history');
  $('modal-body').innerHTML=`<div style="padding:12px;font-size:12px;color:var(--text2)">${t('loading')}</div>`;
  $('modal-actions').innerHTML='';
  $('modal-overlay').classList.add('open');
  fetchHistory();
}

async function fetchHistory(){
  try{
    // Backed by `git log` against the local checkout (backend/git_ops.py) —
    // full per-edit history survives even though only the daily backup push
    // to GitHub is on a slower cadence.
    const commits=await apiFetch(`/api/history?path=${encodeURIComponent(currentPath)}`);
    renderHistoryList(commits);
  }catch(e){
    $('modal-body').innerHTML=`<p style="color:var(--text2);font-size:13px">Error: ${escHtml(e.message)}</p>`;
  }
}

function renderHistoryList(commits){
  if(!commits.length){$('modal-body').innerHTML=`<p style="color:var(--text2);font-size:13px">No history found.</p>`;return;}
  $('modal-body').innerHTML=`<div class="history-list">${commits.map(c=>`
    <div class="history-item" onclick="previewCommit('${escHtml(c.sha)}')">
      <span class="history-sha">${escHtml(c.short)}</span>
      <span class="history-msg">${escHtml(c.message)}</span>
      <span class="history-meta">${escHtml(c.author)}<br>${relativeDate(c.date)}</span>
    </div>`).join('')}</div>`;
  $('modal-actions').innerHTML='';
}

async function previewCommit(sha){
  $('modal-body').innerHTML=`<div style="padding:12px;font-size:12px;color:var(--text2)">${t('loading')}</div>`;
  $('modal-actions').innerHTML='';
  try{
    const data=await apiFetch(`/api/history/content?path=${encodeURIComponent(currentPath)}&sha=${encodeURIComponent(sha)}`);
    const content=data.content;
    const{body}=parseFrontmatter(content);
    _pendingRestoreContent=content;
    $('modal-body').innerHTML=`<div style="max-height:320px;overflow-y:auto;border:0.5px solid var(--border);border-radius:6px;padding:14px;font-size:13px;line-height:1.65">${marked.parse(body)}</div>`;
    $('modal-actions').innerHTML=`
      <button onclick="fetchHistory()">${t('back')}</button>
      <button class="btn-primary" onclick="restoreVersion(_pendingRestoreContent)">${t('restore_version')}</button>`;
  }catch(e){
    $('modal-body').innerHTML=`<p style="color:var(--text2);font-size:13px">Error: ${escHtml(e.message)}</p>`;
    $('modal-actions').innerHTML=`<button onclick="fetchHistory()">${t('back')}</button>`;
  }
}

async function restoreVersion(content){
  closeModal();
  const ok=await requireUnlock();
  if(!ok) return;
  originalContent=await fetchDoc(currentPath);
  editorDirty=true;
  $('editor').value=content;
  hideDraftBanner();
  _activateEditorPanel();
  const{body}=parseFrontmatter(content);
  try{$('view').innerHTML=marked.parse(body);}catch{$('view').innerHTML='';}
}

// ── Wiki autocomplete ──
function getOrCreateWikiComplete(){
  let el=document.getElementById('wiki-complete');
  if(!el){
    el=document.createElement('div');
    el.id='wiki-complete';
    el.style.display='none';
    document.body.appendChild(el);
  }
  return el;
}

function hideWikiComplete(){
  const el=document.getElementById('wiki-complete');
  if(el) el.style.display='none';
  wikiCompleteIdx=-1;
  wikiCompleteItems=[];
}

function insertWikiLink(title){
  const ta=$('editor');
  const pos=ta.selectionStart;
  const before=ta.value.slice(0,pos);
  const m=before.match(/\[\[([^\]]*)$/);
  if(!m) return;
  const start=pos-m[0].length;
  taInsert(ta,`[[${title}]]`,start,pos);
  ta.dispatchEvent(new Event('input'));
  hideWikiComplete();
}

function initWikiAutocomplete(){
  const ta=$('editor');
  if(!ta) return;
  ta.addEventListener('keyup',e=>{
    if(['ArrowUp','ArrowDown','Enter','Escape'].includes(e.key)) return;
    const pos=ta.selectionStart;
    const before=ta.value.slice(0,pos);
    const m=before.match(/\[\[([^\]]{0,40})$/);
    if(!m){hideWikiComplete();return;}
    const q=m[1].toLowerCase();
    const matches=tree.filter(p=>p.title.toLowerCase().includes(q)).slice(0,8);
    if(!matches.length){hideWikiComplete();return;}
    wikiCompleteItems=matches;
    wikiCompleteIdx=-1;
    const wrap=$('editor-wrap');
    const rect=wrap.getBoundingClientRect();
    const el=getOrCreateWikiComplete();
    el.style.left=rect.left+'px';
    el.style.top=(rect.bottom-2)+'px';
    el.style.display='block';
    el.innerHTML=matches.map((p,i)=>`<div class="wc-item" data-idx="${i}" onmousedown="event.preventDefault();insertWikiLink(${JSON.stringify(p.title)})">${escHtml(p.title)}</div>`).join('');
  });
  ta.addEventListener('keydown',e=>{
    const el=document.getElementById('wiki-complete');
    if(!el||el.style.display==='none') return;
    if(e.key==='ArrowDown'){e.preventDefault();wikiCompleteIdx=Math.min(wikiCompleteIdx+1,wikiCompleteItems.length-1);updateWikiActive();}
    else if(e.key==='ArrowUp'){e.preventDefault();wikiCompleteIdx=Math.max(wikiCompleteIdx-1,0);updateWikiActive();}
    else if(e.key==='Enter'&&wikiCompleteIdx>=0){e.preventDefault();insertWikiLink(wikiCompleteItems[wikiCompleteIdx].title);}
    else if(e.key==='Escape'){hideWikiComplete();}
  });
}

function updateWikiActive(){
  const items=document.querySelectorAll('#wiki-complete .wc-item');
  items.forEach((el,i)=>el.classList.toggle('active',i===wikiCompleteIdx));
}

// ── Settings modal ──
function openSettings(){
  $('modal-title').textContent='Настройки';
  $('modal-body').innerHTML=`
    <div class="field">
      <label>Отображение</label>
      <label class="toggle-row"><input type="checkbox" id="pref-toc" ${displayPrefs.showToc?'checked':''} onchange="setDisplayPref('showToc',this.checked)"><span>Показывать оглавление</span></label>
      <label class="toggle-row"><input type="checkbox" id="pref-split" ${displayPrefs.splitPreview?'checked':''} onchange="setDisplayPref('splitPreview',this.checked)"><span>Разделённый редактор</span></label>
    </div>
    <div class="field" id="sync-field" style="margin-top:12px;padding-top:12px;border-top:0.5px solid var(--border)">
      <label>Бэкап в GitHub</label>
      <div id="sync-status" style="font-size:12px;color:var(--text2)">Загрузка…</div>
      <button class="bar-btn" style="margin-top:8px" onclick="triggerSyncPush()">Запушить сейчас</button>
    </div>`;
  $('modal-actions').innerHTML=`<button class="btn-primary" onclick="closeModal()">Закрыть</button>`;
  $('modal-overlay').classList.add('open');
  refreshSyncStatus();
}

// last_push_at/last_push_error come from the backend's background push loop
// (see PUSH_INTERVAL_SECONDS in backend/app.py) — this is the "is the daily
// backup actually landing" check, surfaced right where the owner would look.
async function refreshSyncStatus(){
  const el=$('sync-status');
  if(!el) return;
  try{
    const s=await apiFetch('/api/sync/status');
    el.textContent=s.last_push_at
      ?`Последний пуш: ${relativeDate(new Date(s.last_push_at*1000).toISOString())}${s.last_push_error?' — ошибка: '+s.last_push_error:''}`
      :'Пуша ещё не было';
    el.style.color=s.last_push_error?'var(--red)':'var(--text2)';
  }catch{el.textContent='Недоступно';}
}

async function triggerSyncPush(){
  try{
    await apiFetch('/api/sync/push','POST');
    toast('Запушено в GitHub');
    refreshSyncStatus();
  }catch(e){toast('Ошибка пуша: '+e.message,true);}
}

function closeModal(){$('modal-overlay').classList.remove('open');}

// ── Toast ──
let toastTimer;
function toast(msg,isError=false){
  const el=$('toast');
  el.textContent=msg;
  el.classList.toggle('toast-error',isError);
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{el.classList.remove('show','toast-error')},isError?6000:2500);
}


// ── Editor keyboard shortcuts (Tab indent, Ctrl+B/I) ──
function initEditorShortcuts(){
  const ta=$('editor');
  if(!ta) return;
  ta.addEventListener('keydown',e=>{
    if(!$('editor-wrap').classList.contains('edit-active')) return;
    // Tab → insert 2 spaces (prevent focus shift)
    if(e.key==='Tab'&&!e.metaKey&&!e.ctrlKey&&!e.altKey){
      e.preventDefault();
      const s=ta.selectionStart,end=ta.selectionEnd;
      taInsert(ta,'  ',s,end);
      ta.dispatchEvent(new Event('input'));
      return;
    }
    // Ctrl/Cmd+B → Bold
    if((e.metaKey||e.ctrlKey)&&e.key==='b'){
      e.preventDefault();
      fmt('**','**','bold text');
      return;
    }
    // Ctrl/Cmd+I → Italic
    if((e.metaKey||e.ctrlKey)&&e.key==='i'){
      e.preventDefault();
      fmt('_','_','italic text');
      return;
    }
  });
}

// Initialize wiki autocomplete after DOM ready
initEditorShortcuts();
initWikiAutocomplete();

init();
</script>
