<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>База знаний Автоскан</title>
<link rel="icon" type="image/png" href="/docs/assets/brand/autoskan-logo-transparent.png">
<link rel="icon" type="image/x-icon" href="/docs/assets/brand/autoskan-favicon-32x32.ico">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js" integrity="sha512-pmjEJQ7CveksANaAKdCJZMig7eAcCFFzE1b5XnlnxdB/vU3AOStJ5SF7w4tFuqskuU31ETnAaWTYRQOYg2WHKw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<link rel="stylesheet" href="/style.css">

</head>
<body>
<div id="header">
  <div class="logo" onclick="goHome()">
    <img class="logo-img" src="/docs/assets/brand/autoskan-logo-transparent.png" alt="Автоскан">
    <div class="logo-text">
      <span id="site-name">База знаний</span>
      <span class="logo-sub">Автоскан</span>
    </div>
  </div>
  <div id="h-space"></div>
  <button id="burger" onclick="toggleSidebar()" aria-label="Menu"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
  <button class="bar-btn" id="btn-test" title="Тестирование">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>
    <span>Тестирование</span>
  </button>
  <div id="search-box" onclick="openSearch()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span id="lbl-search">Search...</span><span class="kbd">⌘K</span>
  </div>
  <div id="role-badge" style="display:none;align-items:center;gap:5px;font-size:12px;padding:3px 6px 3px 8px;border:0.5px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text2)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span id="role-name"></span><button onclick="logoutRole()" title="Выйти" style="background:none;border:none;cursor:pointer;padding:0;color:var(--text3);font-size:14px;line-height:1;margin-left:3px;display:flex;align-items:center">✕</button></div>
  <button id="btn-settings" onclick="openSettings()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
  </button>
</div>
<div id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div id="layout">
  <div id="sidebar">
    <div id="tree"></div>
    <div id="sidebar-quick">
      <div class="sidebar-label">БЫСТРЫЙ ДОСТУП</div>
      <div class="quick-item" onclick="openFavoritesView()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span>Избранное</span>
        <span id="fav-count" class="quick-badge" style="display:none">0</span>
      </div>
      <div class="quick-item" onclick="openRecentView()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>Недавние</span>
      </div>
      <div class="quick-item" onclick="const p=tree.find(q=>q.path==='company/contacts');if(p)openPage(p);">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        <span>Контакты</span>
      </div>
      <div class="quick-item" onclick="openLinksPage()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
        <span>Ссылки</span>
      </div>
    </div>
    <div id="sidebar-suggest">
      <div class="suggest-text">Не нашли нужное?</div>
      <button class="suggest-btn" onclick="toast('Функция обращения появится в следующем обновлении')">Предложить статью</button>
    </div>
  </div>
  <div id="content">
    <div id="content-bar">
      <div class="breadcrumb" id="breadcrumb"></div>
      <div id="cb-space"></div>
      <button class="bar-btn" id="btn-append" onclick="openAppendModal()" style="display:none" title="Добавить запись">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>Добавить</span>
      </button>
      <button class="bar-btn" id="btn-delete" onclick="deletePage()" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
        <span id="lbl-delete">Delete</span>
      </button>
      <button class="bar-btn" id="btn-rename" onclick="openRenamePage()" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
        <span id="lbl-rename">Rename</span>
      </button>
      <button class="bar-btn" id="btn-history" onclick="openHistory()" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span id="lbl-history">History</span>
      </button>
      <button class="bar-btn" id="btn-visibility" onclick="openPageVisibility()" style="display:none" title="Видимость страницы">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
      <button class="bar-btn" id="btn-editors" onclick="openPageEditors()" style="display:none" title="Редакторы страницы">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      </button>
      <button class="bar-btn" id="btn-fav" onclick="toggleFavorite()" style="display:none" title="Добавить в избранное">
        <svg id="btn-fav-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </button>
      <button class="bar-btn" id="btn-share" onclick="sharePage()" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        <span id="lbl-share">Share</span>
      </button>
      <button class="bar-btn" id="btn-print" onclick="window.print()" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        <span id="lbl-print">Print</span>
      </button>
      <button class="bar-btn" id="btn-edit" onclick="startEdit()" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        <span id="lbl-edit">Edit</span>
      </button>
      <div class="edit-btns" id="edit-btns">
        <button class="bar-btn" id="btn-cancel" onclick="cancelEdit()"><span id="lbl-cancel">Cancel</span></button>
        <button class="bar-btn" id="btn-save" onclick="savePage()">
          <span id="save-spin" style="display:none" class="spin"></span>
          <span id="lbl-save">Save</span>
        </button>
      </div>
    </div>
    <div id="panels">
      <div id="empty">
        <div id="empty-placeholder" style="display:flex;flex-direction:column;align-items:center;gap:10px">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span id="lbl-empty">Select a page or create a new one</span>
        </div>
        <div id="recent-wrap" style="display:none"></div>
      </div>
      <div id="view-wrap" style="display:none"><div id="view"></div></div>
      <div id="editor-wrap">
        <div id="md-toolbar">
          <!-- Text formatting -->
          <button class="tb-btn" title="Bold" onclick="fmt('**','**','bold text')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 4h8a4 4 0 010 8H6z"/><path d="M6 12h9a4 4 0 010 8H6z"/></svg></button>
          <button class="tb-btn" title="Italic" onclick="fmt('_','_','italic text')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg></button>
          <button class="tb-btn" title="Strikethrough" onclick="fmt('~~','~~','strikethrough')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4H9a3 3 0 00-2.83 4"/><path d="M14 12a4 4 0 010 8H6"/><line x1="4" y1="12" x2="20" y2="12"/></svg></button>
          <div class="tb-sep"></div>
          <!-- Headings -->
          <button class="tb-btn" title="Heading 1" onclick="fmtLine('# ')">H1</button>
          <button class="tb-btn" title="Heading 2" onclick="fmtLine('## ')">H2</button>
          <button class="tb-btn" title="Heading 3" onclick="fmtLine('### ')">H3</button>
          <div class="tb-sep"></div>
          <!-- Blocks & lists -->
          <button class="tb-btn" title="Blockquote" onclick="fmtLine('> ')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="2" height="16" rx="1" fill="currentColor" stroke="none"/><line x1="9" y1="8" x2="20" y2="8"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="16" x2="20" y2="16"/></svg></button>
          <button class="tb-btn" title="Unordered list" onclick="fmtLine('- ')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/></svg></button>
          <button class="tb-btn" title="Ordered list" onclick="fmtLine('1. ')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4M4 10h2" stroke-linecap="round"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1" stroke-linecap="round"/></svg></button>
          <button class="tb-btn" title="Task list" onclick="fmtLine('- [ ] ')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="13" height="13" rx="2"/><path d="M6 11l3 3 5-5"/><line x1="19" y1="9" x2="21" y2="9"/><line x1="19" y1="14" x2="21" y2="14"/><line x1="19" y1="19" x2="21" y2="19"/></svg></button>
          <div class="tb-sep"></div>
          <!-- Code -->
          <button class="tb-btn" title="Inline code" onclick="fmt('`','`','code')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></button>
          <button class="tb-btn" title="Code block" onclick="fmt('\n```\n','\n```\n','code here')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="10 9 7 12 10 15"/><polyline points="14 9 17 12 14 15"/></svg></button>
          <div class="tb-sep"></div>
          <!-- Insert -->
          <button class="tb-btn" title="Link" onclick="fmt('[','](url)','link text')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg></button>
          <button class="tb-btn" title="Image" onclick="fmt('![','](url)','alt text')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></button>
          <button class="tb-btn" title="Video" onclick="fmtVideo()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="15" height="16" rx="2"/><path d="M22 8l-5 4 5 4V8z"/></svg></button>
          <button class="tb-btn" title="Table" onclick="fmtTable()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="12" y1="3" x2="12" y2="21"/></svg></button>
          <button class="tb-btn" title="Horizontal rule" onclick="fmt('\n---\n','','')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/></svg></button>
        </div>
        <div id="draft-banner">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="draft-banner-msg">You have an unsaved draft.</span>
          <button class="draft-banner-btn" onclick="restoreDraft()" id="btn-draft-restore">Restore draft</button>
          <button class="draft-banner-btn" onclick="discardDraft()" id="btn-draft-discard">Discard</button>
        </div>
        <textarea id="editor" spellcheck="false"></textarea>
      </div>
      <div id="toc"><div class="toc-title" id="lbl-toc">On this page</div><div id="toc-list"></div></div>
    </div>
  </div>
</div>
<div id="search-overlay" onclick="if(event.target===this)closeSearch()">
  <div id="search-panel">
    <div id="search-input-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search-q" autocomplete="new-password" name="search_q" oninput="runSearch(this.value)" onkeydown="searchKey(event)">
    </div>
    <div id="search-results"></div>
  </div>
</div>
<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal"><h3 id="modal-title"></h3><div id="modal-body"></div><div class="modal-actions" id="modal-actions"></div></div>
</div>
<div id="role-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;align-items:center;justify-content:center">
  <div style="background:var(--bg);border:0.5px solid var(--border);border-radius:12px;padding:32px 28px;width:340px;box-shadow:0 12px 36px rgba(0,0,0,.2)">
    <div style="font-weight:600;font-size:16px;margin-bottom:6px;color:var(--text)">Автоскан — База знаний</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:20px">Введите пароль для доступа к базе знаний</div>
    <input type="password" id="role-pw-input" style="width:100%;box-sizing:border-box;padding:8px 10px;border:0.5px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text);font-size:13px;outline:none" placeholder="Пароль" onkeydown="if(event.key==='Enter')submitRoleLogin()">
    <div id="role-pw-error" style="display:none;color:#cf222e;font-size:12px;margin-top:6px"></div>
    <div style="margin-top:16px;display:flex;justify-content:flex-end">
      <button class="btn-primary" onclick="submitRoleLogin()">Войти</button>
    </div>
  </div>
</div>
<div id="toast"></div>
<button id="back-to-top" onclick="scrollViewToTop()" title="Наверх" aria-label="Наверх">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
</button>

<script>
const $=id=>document.getElementById(id);

// ── Config & i18n ──
let cfg={},i18n={};

// ── Page tree ──
let tree=[];

// ── Navigation state ──
let currentPath=null;

// ── Editor state ──
let editorDirty=false,originalContent=null,dragDropInit=false;

// ── Auth state ──

// ── Role system ──
let roles=[],currentRole=null;

// ── Sections config ──
const SECTIONS=[
  {slug:'company',       name:'Компания',              folder:'company',           color:'#3B82F6', icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>'},
  {slug:'products',      name:'Продукты',              folder:'products',          color:'#8B5CF6', icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>'},

// ── Wiki link extension (registered after marked loads) ──
const wikiLinkExtension={
  name:'wikilink',
  level:'inline',
  start(src){return src.indexOf('[[');},
  tokenizer(src){
    const match=src.match(/^\[\[([^\]]+)\]\]/);
    if(match) return{type:'wikilink',raw:match[0],text:match[1].trim()};
  },
  renderer(token){
    const page=tree.find(p=>
      p.title.toLowerCase()===token.text.toLowerCase()||
      p.path.toLowerCase()===token.text.toLowerCase()
    );
    if(page){
      const data=JSON.stringify(page).replace(/"/g,'&quot;');
      return`<a href="#" class="wiki-link" onclick="openPage(${data});return false">${escHtml(token.text)}</a>`;
    }
    return`<span class="wiki-link broken" title="Page not found">${escHtml(token.text)}</span>`;
  }
};
marked.use({extensions:[wikiLinkExtension]});

// ── Helpers ──
function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function relativeDate(iso){
  const diff=Date.now()-new Date(iso).getTime();
  const m=Math.floor(diff/60000);
  if(m<2) return 'just now';
  if(m<60) return `${m} minutes ago`;
  const h=Math.floor(m/60);
  if(h<24) return `${h} hour${h!==1?'s':''} ago`;
  const d=Math.floor(h/24);
  if(d<30) return `${d} day${d!==1?'s':''} ago`;
  const mo=Math.floor(d/30);
  if(mo<12) return `${mo} month${mo!==1?'s':''} ago`;
  return `${Math.floor(mo/12)} year${Math.floor(mo/12)!==1?'s':''} ago`;
}

// Resolve a path relative to the current markdown file's directory.
// e.g. currentPath='docs/setup/installation.md', rel='../assets/img.png'
//      → 'docs/assets/img.png'
function resolveDocRelative(rel){
  const parts=currentPath.split('/');
  parts.pop(); // drop filename, keep directory segments
  for(const seg of rel.split('/')){
    if(seg==='..')parts.pop();
    else if(seg&&seg!=='.')parts.push(seg);
  }
  return parts.join('/');
}

// ── Frontmatter parser ──
function parseFrontmatter(md){
  const meta={};
  let body=md;
  const m=md.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?/);
  if(m){
    body=md.slice(m[0].length);
    m[1].split(/\r?\n/).forEach(line=>{
      const kv=line.match(/^(\w[\w-]*):\s*(.*)$/);
      if(!kv) return;
      const k=kv[1],v=kv[2].trim();
      if(v.startsWith('[')){
        try{meta[k]=JSON.parse(v.replace(/'/g,'"'));}
        catch{meta[k]=v.slice(1,-1).split(',').map(s=>s.trim()).filter(Boolean);}
      } else {
        meta[k]=v.replace(/^["']|["']$/g,'');
      }
    });
    if(typeof meta.tags==='string'){
      meta.tags=meta.tags.split(',').map(s=>s.trim()).filter(Boolean);
    }
  }
  return{meta,body};
}

async function init(){
  loadDisplayPrefs();
  // Served from the domain root by Caddy — no project-page subpath to strip.
  _basePath='';
  // Clean-URL deep link: Caddy's try_files sends any unmatched path straight
  // to docs.html (see Caddyfile), so location.pathname IS the requested page —
  // no 404.html redirect-with-?p= trick needed here (that was a GitHub Pages
  // workaround for not supporting arbitrary rewrites).
  const _fromPath=location.pathname.replace(/^\/+|\/+$/g,'');
  if(_fromPath) _pendingUrlPage=decodeURIComponent(_fromPath).replace(/\.md$/,'');

  // 1. load config.json — site_name/lang only; this path has no tokens
  try{
    const r=await fetch('/config.json',{cache:'no-cache'});
    if(r.ok) cfg=await r.json();
  }catch{}

  // 2. merge user-local overrides from localStorage
  const saved=localStorage.getItem('wn_cfg');
  if(saved){
    try{
      const local=JSON.parse(saved);
      if(local.lang) cfg.lang=local.lang;
    }catch{localStorage.removeItem('wn_cfg');}
  }

  await loadI18n('ru');
  applyI18n();

  // Session lives server-side (HttpOnly cookie) — ask the backend who we are
  // rather than trusting a client-stored role.
  const restored=await restoreSession();
  if(!restored){openRoleModal();return;}
  applyRoleUI();
  loadTree();
  initBackToTop();
  setInterval(pollTree,20000);

  document.addEventListener('keydown',e=>{
    const inEditor=$('editor-wrap').classList.contains('edit-active');
    const modalOpen=$('modal-overlay').classList.contains('open');
    if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openSearch();}
    if((e.metaKey||e.ctrlKey)&&e.key==='s'&&inEditor){e.preventDefault();savePage();}
    // Ctrl/Cmd+E — open editor (only when viewing, not already editing)
    if((e.metaKey||e.ctrlKey)&&e.key==='e'&&!inEditor&&currentPath&&!modalOpen){e.preventDefault();startEdit();}
    // Ctrl/Cmd+Enter — confirm the primary action of an open modal
    if((e.metaKey||e.ctrlKey)&&e.key==='Enter'&&modalOpen){
      e.preventDefault();
      const primary=$('modal-actions').querySelector('.btn-primary');
      if(primary) primary.click();
    }
    if(e.key==='Escape'){
      closeSearch();
      hideWikiComplete();
      if(modalOpen) closeModal();
      else if(inEditor) cancelEdit();
    }
  });
  window.addEventListener('beforeunload',e=>{
    if(editorDirty){e.preventDefault();e.returnValue='';}
  });
}

// ── API layer — same-origin calls to the local backend (see backend/app.py) ──
// No CORS, no external host: docs.html and /api/* are served from the same
// domain by Caddy, so this is all plain same-origin fetch().
async function apiFetch(path,method='GET',body){
  const r=await fetch(path,{
    method,
    headers:body?{'Content-Type':'application/json'}:undefined,
    body:body?JSON.stringify(body):undefined,
    credentials:'same-origin'
  });
  if(!r.ok){
    let msg=r.statusText;
    try{const e=await r.json();msg=e.error||msg;}catch{}
    throw new Error(msg);
  }
  return r.status===204?null:r.json();
}

// fetchDoc — plain static-file read (docs/*.md, same as tree.json/search.json)
async function fetchDoc(path){
  const r=await fetch('/'+path,{cache:'no-cache'});
  if(!r.ok) throw new Error(r.statusText);
  return r.text();
}

// apiUploadFile — multipart, not base64-in-JSON. Fine for a screenshot either
// way, but a base64 string in a JSON body is a bad way to move a video file
// through the browser: ~33% size inflation, held as one big JS string in
// memory, no streaming. FormData avoids all of that.
async function apiUploadFile(path,message,file){
  const fd=new FormData();
  fd.append('path',path);
  fd.append('message',message);
  fd.append('file',file);
  const r=await fetch('/api/write/upload',{method:'POST',body:fd,credentials:'same-origin'});
  if(!r.ok){
    let msg=r.statusText;
    try{const e=await r.json();msg=e.error||msg;}catch{}
    throw new Error(msg);
  }
  return r.json();
}

// Password verification happens server-side (POST /api/login) — the browser

async function loadRoles(){

async function restoreSession(){
  try{
    const data=await apiFetch('/api/me');
    if(data.role){currentRole=data.role;await loadRoles();return true;}
  }catch{}
  return false;
}

function canEdit(){return currentRole?.can_edit===true;}

// Returns true if current role can edit a specific page
function canEditPage(page){
  if(canEdit()) return true; // owner always can
  const slug=currentRole?.slug;
  if(!slug||!page) return false;
  return Array.isArray(page.editors)&&page.editors.includes(slug);
}

const FULL_ACCESS_ROLES=['owner','admin','director','head'];

function isHiddenPage(page){
  // Check folder-level hiding from role config
  const hs=currentRole?.hidden_sections||[];
  if(hs.some(s=>page.path===s||page.path.startsWith(s+'/'))) return true;
  // Full-access roles bypass per-document restrictions
  if(FULL_ACCESS_ROLES.includes(currentRole?.slug)) return false;
  // Check per-document role whitelist (empty/absent = visible to all)
  const allowed=page.roles;
  if(allowed&&allowed.length>0){
    const slug=currentRole?.slug||null;
    if(!slug||!allowed.includes(slug)) return true;
  }
  return false;
}

async function saveSectionVisibility(folderKey){

function declDoc(n){
  if(n%100>=11&&n%100<=19) return 'документов';
  if(n%10===1) return 'документ';
  if(n%10>=2&&n%10<=4) return 'документа';
  return 'документов';
}
function declIncident(n){
  if(n%100>=11&&n%100<=19) return 'инцидентов';
  if(n%10===1) return 'инцидент';
  if(n%10>=2&&n%10<=4) return 'инцидента';
  return 'инцидентов';
}

function showDashboard(){
  const visibleSections=SECTIONS.filter(s=>!isHiddenSection(s));
  const recent=[...tree].filter(p=>p.updated_at).sort((a,b)=>b.updated_at.localeCompare(a.updated_at)).slice(0,8);
  const cards=visibleSections.map(sec=>{
    const c=sec.color||'var(--accent)';
    let countLabel;
    if(sec.slug==='glossary'){
      const gPage=tree.find(p=>p.path==='glossary/index');
      const n=gPage?.termCount||0;
      countLabel=n?`${n} терминов`:'Глоссарий';

        <div class="dash-card-name">${escHtml(sec.name)}</div>

      return`<div class="dash-card" onclick="${onclick}">
        <div class="dash-card-icon" style="color:${c};background:${c}1a">${sec.icon}</div>
        <div class="dash-card-name">${escHtml(sec.name)}</div>
        <div class="dash-card-count">${n} ${declIncident(n)}</div>
      </div>`;
    }
    const _df=[sec.folder,...(sec.extraFolders||[])];
    const count=tree.filter(p=>_df.some(f=>p.path.startsWith(f+'/'))&&!isHiddenPage(p)&&p.isCounting).length;
    const onclick=sec.direct?`openPage(tree.find(p=>p.path==='${sec.directPath}'))`:`openSection('${sec.slug}')`;

  const recentHtml=recent.length
    ?recent.map(p=>`<div class="recent-upd-item" onclick="openPage(${JSON.stringify(p).replace(/"/g,'&quot;')})">
        <div class="recent-upd-title">${escHtml(p.title)}</div>

  el.style.display='block';
  el.innerHTML=`<div class="dash-layout">
    <div class="dash-main">
      <div class="dash-welcome">
        <h1 class="dash-title">Добро пожаловать в базу знаний Автоскан</h1>
        <p class="dash-sub">Найдите ответы на вопросы, инструкции и руководства по продуктам, процессам и оборудованию</p>

async function loadTree(){
  $('tree').innerHTML=`<div style="padding:12px;font-size:12px;color:var(--text2)">${t('loading')}</div>`;
  try{
    const r=await fetch('/tree.json',{cache:'no-cache'});
    if(!r.ok) throw new Error();
    tree=await r.json();
    renderTree(tree);
    if(!currentPath){
      if(_pendingUrlPage){
        const needle=_pendingUrlPage.toLowerCase();
        const targetPage=tree.find(p=>p.path.toLowerCase()===needle)
          ||tree.find(p=>p.path.toLowerCase().endsWith('/'+needle)||p.path.split('/').pop().toLowerCase()===needle.split('/').pop());
        _pendingUrlPage=null;
        if(targetPage){openPage(targetPage);return;}
      }
      showEmpty();
    }
  }catch{
    $('tree').innerHTML=`<div style="padding:12px;font-size:12px;color:var(--text2)">${t('error_load')}</div>`;
  }
}

// Silent background refresh so a folder/page created by one editor shows up
// for everyone else without a manual reload — no loading flash, no re-render
// unless the tree actually changed. Skipped during editTreeMode: a mid-drag
// re-render would wipe pendingReorders and the in-progress drag state.
async function pollTree(){
  if(editTreeMode) return;
  try{
    const r=await fetch('/tree.json',{cache:'no-cache'});
    if(!r.ok) return;
    const fresh=await r.json();
    if(JSON.stringify(fresh)===JSON.stringify(tree)) return;
    tree=fresh;
    renderTree(tree);
  }catch{}
}

function renderTree(pages){
  const el=$('tree');
  el.innerHTML='';
  el.classList.toggle('tree-editing',editTreeMode);

  // Home link
  const homeDiv=document.createElement('div');
  homeDiv.className='sec-home'+((!currentPath&&!currentSection)?' active':'');
  homeDiv.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Главная</span>`;
  homeDiv.onclick=()=>goHome();
  el.appendChild(homeDiv);

  const lbl=document.createElement('div');
  lbl.className='sidebar-label';
  lbl.innerHTML=`<span>РАЗДЕЛЫ</span>`;
  if(canEdit()){
    const editBtn=document.createElement('button');
    editBtn.className='tree-edit-toggle'+(editTreeMode?' active':'');
    editBtn.title=editTreeMode?t('edit_tree_apply'):t('edit_tree');
    editBtn.innerHTML=editTreeMode
      ?'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>'
      :'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.83 0 114 4L7.5 20.5 2 22l1.5-5.5z"/></svg>';
    editBtn.onclick=e=>{e.stopPropagation();toggleEditTreeMode();};
    lbl.appendChild(editBtn);
  }
  el.appendChild(lbl);

  SECTIONS.forEach(sec=>{
    if(isHiddenSection(sec)) return;
    const _secFolders=[sec.folder,...(sec.extraFolders||[])];
    const secFolderMarkers=pages.filter(p=>p._folder&&_secFolders.some(f=>p.path.startsWith(f+'/')));
    const secPages=pages.filter(p=>!p._folder&&_secFolders.some(f=>p.path.startsWith(f+'/')||p.path===f)&&!isHiddenPage(p));
    const isActive=currentSection===sec.slug;
    const wrap=document.createElement('div');
    wrap.className='sec-wrap';

    // Direct-link section: renders as a single clickable row, no expand
    if(sec.direct){
      const directPage=pages.find(p=>p.path===sec.directPath);
      const isActiveDirect=currentPath===`docs/${sec.directPath}.md`;
      const hdr=document.createElement('div');
      hdr.className='sec-hdr'+(isActiveDirect?' active':'');
      hdr.innerHTML=`<span class="sec-icon">${sec.icon}</span><span class="sec-name">${escHtml(sec.name)}</span>`;
      if(directPage) hdr.onclick=()=>openPage(directPage);
      wrap.appendChild(hdr);
      el.appendChild(wrap);
      return;
    }

    const hdr=document.createElement('div');
    hdr.className='sec-hdr'+(isActive?' active':'');
    hdr.innerHTML=`<span class="sec-icon">${sec.icon}</span><span class="sec-name">${escHtml(sec.name)}</span><span class="sec-cnt">${secPages.length}</span><svg class="sec-arrow${isActive?' open':''}" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>`;
    if(canEdit()){
      const gearBtn=document.createElement('button');
      gearBtn.className='sec-gear-btn';
      gearBtn.title='Видимость раздела';
      gearBtn.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>';
      gearBtn.onclick=e=>{e.stopPropagation();openSectionVisibility(sec);};
      hdr.appendChild(gearBtn);
    }
    hdr.onclick=e=>{if(!e.target.closest('.sec-gear-btn'))openSection(sec.slug);};
    wrap.appendChild(hdr);

    if(isActive){
      const list=document.createElement('div');
      list.className='sec-pages';
      const directPages=[];
      // subfolderMap: mapKey → {name, baseFolder, pages[], subfolders: Map<sfKey,{name,path,pages[]}>}
      const subfolderMap=new Map();
      const arrowSvg=`<svg class="sec-subfolder-arrow" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>`;

      // Seed from _folder markers (depth 1 and 2)
      secFolderMarkers.forEach(f=>{
        const bf=_secFolders.find(sf=>f.path.startsWith(sf+'/'))||sec.folder;
        const rel=f.path.substring(bf.length+1);
        const relParts=rel.split('/');
        const mapKey=bf+'/'+relParts[0];
        if(!subfolderMap.has(mapKey))
          subfolderMap.set(mapKey,{name:f.folder_titles?.[relParts[0]]||relParts[0],baseFolder:bf,pages:[],subfolders:new Map()});
        if(relParts.length===1){
          subfolderMap.get(mapKey).name=f.title;
        } else if(relParts.length===2){
          const sf1=subfolderMap.get(mapKey);
          const sfKey=mapKey+'/'+relParts[1];
          if(!sf1.subfolders.has(sfKey))
            sf1.subfolders.set(sfKey,{name:f.title,path:bf+'/'+relParts.slice(0,2).join('/'),pages:[]});
        }
      });

      // Fill with pages (depth 1 → direct, depth 2 → level-1 pages, depth 3+ → level-2 pages)
      secPages.forEach(p=>{
        const bf=_secFolders.find(sf=>p.path.startsWith(sf+'/')||p.path===sf)||sec.folder;
        const rel=p.path.substring(bf.length+1);
        const relParts=rel.split('/');
        if(relParts.length===1){
          directPages.push(p);
        } else {
          const subKey=relParts[0];
          const mapKey=bf+'/'+subKey;
          const subName=p.folder_titles[subKey]||subKey.replace(/[-_]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
          if(!subfolderMap.has(mapKey))
            subfolderMap.set(mapKey,{name:subName,baseFolder:bf,pages:[],subfolders:new Map()});
          const sf1=subfolderMap.get(mapKey);
          if(relParts.length===2){
            sf1.pages.push(p);
          } else {
            const sub2Key=relParts[1];
            const sfKey=mapKey+'/'+sub2Key;
            const sub2Name=p.folder_titles[sub2Key]||sub2Key.replace(/[-_]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
            if(!sf1.subfolders.has(sfKey))
              sf1.subfolders.set(sfKey,{name:sub2Name,path:(sf1.baseFolder||sec.folder)+'/'+subKey+'/'+sub2Key,pages:[]});
            sf1.subfolders.get(sfKey).pages.push(p);
          }
        }
      });

      const makePageRow=(p,level=0)=>{
        const row=document.createElement('div');
        const cls=level===1?' indented':level>=2?' indented-2':'';
        row.className='tree-row'+(currentPath===`docs/${p.path}.md`?' active':'')+cls;
        row.dataset.path=p.path;
        row.innerHTML=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span class="tree-label" title="${escHtml(p.title)}">${escHtml(p.title)}</span>`;
        row.onclick=()=>openPage(p);
        if(editTreeMode) row.prepend(makeDragHandle());
        return row;
      };
      const makeAddRow=(ctx,level=0)=>{
        const r=document.createElement('div');
        const cls=level===1?' indented':level>=2?' indented-2':'';
        r.className='tree-row sec-add-row'+cls;
        r.innerHTML=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span class="tree-label">Создать</span>`;
        r.onclick=()=>openCreateModal(ctx);
        return r;
      };
      const makeDragHandle=()=>{
        const h=document.createElement('span');
        h.className='tree-drag-handle';
        h.draggable=true;
        h.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><circle cx="8" cy="6" r="1.5"/><circle cx="8" cy="12" r="1.5"/><circle cx="8" cy="18" r="1.5"/><circle cx="16" cy="6" r="1.5"/><circle cx="16" cy="12" r="1.5"/><circle cx="16" cy="18" r="1.5"/></svg>';
        h.onclick=e=>e.stopPropagation();
        return h;
      };
      // Rename/delete buttons on a subfolder header row — only while
      // editTreeMode is on (see the tree-edit-toggle button above), per
      // spec: buttons appear/disappear with the toggle, not on hover alone.
      // stopPropagation so they don't also trigger the header's own
      // expand/collapse onclick (same pattern as the section-visibility
      // gearBtn above).
      const addFolderActions=(hdrEl,folderPath,folderTitle)=>{
        if(!canEdit()||!editTreeMode) return;
        const renameBtn=document.createElement('button');
        renameBtn.className='tree-inline-btn';
        renameBtn.title=t('rename_folder');
        renameBtn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.83 0 114 4L7.5 20.5 2 22l1.5-5.5z"/></svg>';
        renameBtn.onclick=e=>{e.stopPropagation();openRenameFolder(folderPath,folderTitle);};
        hdrEl.appendChild(renameBtn);
        const deleteBtn=document.createElement('button');
        deleteBtn.className='tree-inline-btn tree-inline-btn-danger';
        deleteBtn.title=t('delete_folder');
        deleteBtn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>';
        deleteBtn.onclick=e=>{e.stopPropagation();deleteFolderConfirm(folderPath,folderTitle);};
        hdrEl.appendChild(deleteBtn);
      };

      if(directPages.length===0&&subfolderMap.size===0){
        const empty=document.createElement('div');
        empty.className='sec-empty';
        empty.textContent='Нет страниц';
        list.appendChild(empty);
      }

      // Two separately-sortable groups per level (pages, then folders) —
      // renderTree always shows direct pages before subfolders regardless
      // of _meta.json's pages[] order, so reorder only ever needs to
      // rearrange within one group or the other, never interleave them.
      const pagesWrap=document.createElement('div');
      directPages.forEach(p=>pagesWrap.appendChild(makePageRow(p)));
      list.appendChild(pagesWrap);

      const subfoldersWrap=document.createElement('div');
      subfolderMap.forEach(({name,baseFolder:sfBase,pages,subfolders},mapKey)=>{
        const subKey=mapKey.split('/').pop();
        const subPath=(sfBase||sec.folder)+'/'+subKey;
        const storageKey=`wn_sf_${sec.slug}_${mapKey.replace('/','_')}`;
        const isOpen=localStorage.getItem(storageKey)==='1';
        const itemWrap=document.createElement('div');
        itemWrap.className='tree-folder-item';
        itemWrap.dataset.folderKey=subKey;
        const hdr=document.createElement('div');
        hdr.className='sec-subfolder-hdr'+(isOpen?' open':'');
        hdr.innerHTML=`${arrowSvg}<span title="${escHtml(name)}">${escHtml(name)}</span>`;
        if(editTreeMode) hdr.insertBefore(makeDragHandle(),hdr.firstChild);
        addFolderActions(hdr,subPath,name);
        const pageWrap=document.createElement('div');
        pageWrap.className='sec-subfolder-pages'+(isOpen?'':' collapsed');

        const sfPagesWrap=document.createElement('div');
        pages.forEach(p=>sfPagesWrap.appendChild(makePageRow(p,1)));
        pageWrap.appendChild(sfPagesWrap);

        // Level-2 subfolders (no further nesting in this data model, so
        // just one pages group each — no separate folders-wrap needed).
        const sfFoldersWrap=document.createElement('div');
        subfolders.forEach(({name:sfName,path:sfPath,pages:sfPages},sfKey)=>{
          const sfStorageKey=`wn_sf_${sec.slug}_${sfKey.replace(/\//g,'_')}`;
          const sfIsOpen=localStorage.getItem(sfStorageKey)==='1';
          const sfItemWrap=document.createElement('div');
          sfItemWrap.className='tree-folder-item';
          sfItemWrap.dataset.folderKey=sfKey.split('/').pop();
          const sfHdr=document.createElement('div');
          sfHdr.className='sec-subfolder-hdr sec-subfolder-hdr-2'+(sfIsOpen?' open':'');
          sfHdr.innerHTML=`${arrowSvg}<span title="${escHtml(sfName)}">${escHtml(sfName)}</span>`;
          if(editTreeMode) sfHdr.insertBefore(makeDragHandle(),sfHdr.firstChild);
          addFolderActions(sfHdr,sfPath,sfName);
          const sfPageWrap=document.createElement('div');
          sfPageWrap.className='sec-subfolder-pages'+(sfIsOpen?'':' collapsed');
          const sfPagesOnlyWrap=document.createElement('div');
          sfPages.forEach(p=>sfPagesOnlyWrap.appendChild(makePageRow(p,2)));
          sfPageWrap.appendChild(sfPagesOnlyWrap);
          if(canEdit()) sfPageWrap.appendChild(makeAddRow(sfPath,2));
          sfHdr.onclick=()=>{
            const opening=!sfHdr.classList.contains('open');
            sfHdr.classList.toggle('open',opening);
            sfPageWrap.classList.toggle('collapsed',!opening);
            localStorage.setItem(sfStorageKey,opening?'1':'0');
          };
          sfItemWrap.appendChild(sfHdr);
          sfItemWrap.appendChild(sfPageWrap);
          sfFoldersWrap.appendChild(sfItemWrap);
          if(editTreeMode) makeSortable(sfPagesOnlyWrap,()=>{
            pendingReorders.set(sfPath,[...sfPagesOnlyWrap.children].map(row=>row.dataset.path.split('/').pop()));
          });
        });
        pageWrap.appendChild(sfFoldersWrap);

        if(canEdit()) pageWrap.appendChild(makeAddRow(subPath,1));
        hdr.onclick=()=>{
          const opening=!hdr.classList.contains('open');
          hdr.classList.toggle('open',opening);
          pageWrap.classList.toggle('collapsed',!opening);
          localStorage.setItem(storageKey,opening?'1':'0');
        };
        itemWrap.appendChild(hdr);
        itemWrap.appendChild(pageWrap);
        subfoldersWrap.appendChild(itemWrap);

        if(editTreeMode){
          const recomputeSub=()=>{
            const pageOrder=[...sfPagesWrap.children].map(row=>row.dataset.path.split('/').pop());
            const folderOrder=[...sfFoldersWrap.children].map(iw=>iw.dataset.folderKey);
            pendingReorders.set(subPath,[...pageOrder,...folderOrder]);
          };
          makeSortable(sfPagesWrap,recomputeSub);
          makeSortable(sfFoldersWrap,recomputeSub);
        }
      });
      list.appendChild(subfoldersWrap);
      if(canEdit()) list.appendChild(makeAddRow(sec.folder));

      if(editTreeMode){
        const recomputeTop=()=>{
          const pageOrder=[...pagesWrap.children].map(row=>row.dataset.path.split('/').pop());
          const folderOrder=[...subfoldersWrap.children].map(iw=>iw.dataset.folderKey);
          pendingReorders.set(sec.folder,[...pageOrder,...folderOrder]);
        };
        makeSortable(pagesWrap,recomputeTop);
        makeSortable(subfoldersWrap,recomputeTop);
      }
      wrap.appendChild(list);
    }
    el.appendChild(wrap);
  });
}


// ── Page open ──
async function openPage(page){
  if(editorDirty&&!confirm('You have unsaved changes. Leave this page and discard them?')) return;
  if(isHiddenPage(page)){
    toast('У вас нет доступа к этой странице');
    return;
  }
  trackRecentPage(page);
  const targetPath=`docs/${page.path}.md`;
  currentPath=targetPath;
  $('view-wrap').scrollTop=0;
  $('back-to-top')?.classList.remove('show');
  // Auto-expand the section this page belongs to, then always re-render —
  // renderTree() computes .active for both regular tree-rows and direct-link
  // section headers (Глоссарий/Инциденты) from currentPath. Rendering before
  // currentPath was updated, or skipping the render when the section hadn't
  // changed, left stale .active state on rows/headers from the previous page.
  const sec=findSectionForPage(page);
  if(sec) currentSection=sec.slug;
  renderTree(tree);

  const parts=page.parts;
  const bc=$('breadcrumb');
  bc.innerHTML=parts.map((p,i)=>
    i<parts.length-1
      ?`<span>${escHtml(p)}</span><span class="sep">›</span>`
      :`<span class="cur">${escHtml(page.title)}</span>`
  ).join('');

  $('empty').style.display='none';
  $('view-wrap').style.display='block';
  $('editor-wrap').style.display='none';
  $('editor-wrap').classList.remove('edit-active');
  $('edit-btns').style.display='none';
  const _e=canEditPage(page)?'flex':'none';
  const _o=canEdit()?'flex':'none';
  $('btn-edit').style.display=_e;
  $('btn-visibility').style.display=_o;
  $('btn-editors').style.display=_o;
  $('btn-fav').style.display='flex';
  $('btn-share').style.display='flex';
  $('btn-print').style.display='flex';
  $('btn-delete').style.display=_o;
  $('btn-rename').style.display=_o;
  $('btn-history').style.display=_e;
  const _ap=(FULL_ACCESS_ROLES.includes(currentRole?.slug)&&['glossary/index','incidents/index'].includes(page.path))?'flex':'none';
  $('btn-append').style.display=_ap;
  updateFavBtn();
  cancelEdit();

  try{
    const md=await fetchDoc(targetPath);
    if(currentPath!==targetPath) return; // user navigated away before fetch completed
    // Update the address bar so users can copy a shareable direct link.
    // Caddy's try_files sends this exact path straight back to docs.html.
    history.replaceState(null,'',_basePath+'/'+page.path);
    renderView(md);
  }catch(e){
    if(currentPath!==targetPath) return;
    $('view').innerHTML=`<p style="color:var(--text2)">${t('error_load')}: ${escHtml(e.message)}</p>`;
  }
}

function renderView(md){
  const{meta,body}=parseFrontmatter(md);
  let metaHtml=`<div class="page-meta">`;
  metaHtml+=`<span>${escHtml(currentPath)}</span>`;
  if(meta.author) metaHtml+=` &nbsp;·&nbsp; <span>${escHtml(t('by'))} ${escHtml(meta.author)}</span>`;
  metaHtml+=`</div>`;
  try{
    let html=marked.parse(body);
    // Rewrite relative image src attributes to site-root-relative URLs.
    // Needed because the SPA is served from the domain root, so the browser
    // resolves relative paths against the site URL, not the .md file location.
    // Matches src="..." that are not already absolute (http/https/protocol-relative/data/fragment).
    // A leading "/" (e.g. /docs/assets/foo.png, written by the upload flow)
    // is *already* site-root-relative — running it through resolveDocRelative
    // anyway treated it as relative-to-the-current-doc and mangled it into a
    // nested, nonexistent path. Same fix already applied to link rewriting
    // below (`resolved=/^\//.test(rel)?...`) — this just brings images in line.
    if(currentPath){
      html=html.replace(
        /(<img\b[^>]*?\bsrc=")(?!https?:\/\/|\/\/|data:|#)([^"]+)"/gi,
        (_,prefix,rel)=>`${prefix}${/^\//.test(rel)?rel:'/'+resolveDocRelative(rel)}"`
      );
    }
    $('view').innerHTML=metaHtml+html;
    // Intercept link clicks: external → new tab, internal → openPage()
    $('view').querySelectorAll('a:not(.wiki-link)').forEach(a=>{
      const href=a.getAttribute('href');
      if(!href||href.startsWith('#')) return;
      if(/^https?:\/\/|^\/\//.test(href)||/\.(pdf|docx?|xlsx?|pptx?|zip|rar|7z|csv|jpe?g|png|gif|webp|svg|mp4|mp3)$/i.test(href)){
        a.target='_blank';a.rel='noopener noreferrer';
      } else {
        a.onclick=e=>{
          e.preventDefault();
          const rel=href.replace(/\.md$/,'');
          const resolved=/^\//.test(rel)?rel.replace(/^\//,''):resolveDocRelative(rel);
          const page=tree.find(p=>p.path===resolved||p.path===resolved+'/index');
          if(page) openPage(page);
          else toast('Страница не найдена: '+resolved);
        };
      }
    });
  }catch(e){$('view').innerHTML=metaHtml+`<pre style="color:var(--red);font-size:12px;padding:12px">Render error: ${escHtml(e.message)}</pre>`;}
  // Build tag chips via DOM — avoids embedding tag values in onclick HTML attributes
  if(meta.tags&&meta.tags.length){
    const tagsDiv=document.createElement('div');
    tagsDiv.className='page-tags';
    meta.tags.forEach(tag=>{
      const chip=document.createElement('span');
      chip.className='tag-chip';
      chip.textContent=tag;
      chip.onclick=()=>{openSearch();$('search-q').value=tag;runSearch(tag);};
      tagsDiv.appendChild(chip);
    });
    $('view').insertBefore(tagsDiv,$('view').firstChild.nextSibling);
  }
  if(currentPath&&/contacts/.test(currentPath)) injectBirthdayBanner($('view'));
  buildToc();
  if(window._searchHighlight){
    const _q=window._searchHighlight;window._searchHighlight=null;
    const _sc=window._searchHighlightScope;window._searchHighlightScope=null;
    highlightInView(_q,_sc);
    const firstMark=$('view').querySelector('mark');
    if(firstMark) setTimeout(()=>firstMark.scrollIntoView({behavior:'smooth',block:'center'}),80);
  }
}

const _BDAY_MONTHS=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];

function parseBirthdays(container){
  const now=new Date();
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const upcoming=[];
  let section='';
  Array.from(container.childNodes).forEach(el=>{
    if(!el.tagName) return;
    if(el.tagName==='H2') section=el.textContent.trim();
    if(el.tagName!=='TABLE') return;
    const headers=Array.from(el.querySelectorAll('thead th')).map(th=>th.textContent.trim());
    const bdayIdx=headers.findIndex(h=>h.includes('🎂'));
    const nameIdx=headers.findIndex(h=>h.includes('ФИО'));
    const roleIdx=headers.findIndex(h=>h.includes('Должность'));
    if(bdayIdx<0||nameIdx<0) return;
    el.querySelectorAll('tbody tr').forEach(row=>{
      const cells=Array.from(row.querySelectorAll('td'));
      const bStr=(cells[bdayIdx]||{}).textContent?.trim();
      const name=(cells[nameIdx]||{}).textContent?.trim();
      const role=roleIdx>=0?(cells[roleIdx]||{}).textContent?.trim():'';
      if(!bStr||bStr==='—'||!name||name==='—') return;
      const m=bStr.match(/^(\d{1,2})\.(\d{1,2})/);
      if(!m) return;
      const day=parseInt(m[1]),month=parseInt(m[2])-1;
      if(month!==today.getMonth()) return;
      const bday=new Date(today.getFullYear(),month,day);
      const diff=Math.round((bday-today)/86400000);
      if(diff<0) return;
      upcoming.push({name,role,section,day,month,diff});
    });
  });
  upcoming.sort((a,b)=>a.day-b.day);
  return upcoming;
}

function buildBirthdayBanner(upcoming){
  if(!upcoming.length) return null;
  const banner=document.createElement('div');
  banner.id='birthday-banner';
  const cards=upcoming.map(p=>{
    const whenTxt=p.diff===0?'<span class="bday-today">🎉 Сегодня!</span>':p.diff===1?'завтра':p.diff>1?'через '+p.diff+' дн.':(-p.diff)+' дн. назад';
    return `<div class="bday-card"><div class="bday-name">${escHtml(p.name)}</div><div class="bday-role">${escHtml(p.role)} · ${escHtml(p.section)}</div><div class="bday-when">${p.day} ${_BDAY_MONTHS[p.month]} · ${whenTxt}</div></div>`;
  }).join('');
  banner.innerHTML=`<div class="bday-title">🎂 Дни рождения в этом месяце</div><div class="bday-list">${cards}</div>`;
  return banner;
}

function injectBirthdayBanner(container){
  const upcoming=parseBirthdays(container);
  const banner=buildBirthdayBanner(upcoming);
  if(!banner) return;
  const meta=container.querySelector('.page-meta');
  if(meta) meta.after(banner); else container.prepend(banner);
}

function highlightInView(q,scope){
  if(!q) return;
  const re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  const highlightNodes=(root)=>{
    const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT);
    const nodes=[];let n;
    while((n=walker.nextNode())) nodes.push(n);
    nodes.forEach(node=>{
      if(!re.test(node.nodeValue)) return;
      re.lastIndex=0;
      const frag=document.createDocumentFragment();
      let last=0,m;
      while((m=re.exec(node.nodeValue))!==null){
        frag.appendChild(document.createTextNode(node.nodeValue.slice(last,m.index)));
        const mark=document.createElement('mark');mark.textContent=m[0];frag.appendChild(mark);
        last=m.index+m[0].length;
      }
      frag.appendChild(document.createTextNode(node.nodeValue.slice(last)));
      node.parentNode.replaceChild(frag,node);
    });
  };
  if(scope==='glossary'){
    $('view').querySelectorAll('table td:first-child').forEach(highlightNodes);
  } else {
    highlightNodes($('view'));
  }
}

function buildToc(){
  const tocEl=$('toc');
  if(!tocEl) return;
  if(!displayPrefs.showToc){tocEl.style.display='none';return;}
  const headings=[...$('view').querySelectorAll('h2,h3')];
  if(headings.length<2){tocEl.style.display='none';return;}
  tocEl.style.display='block';
  const usedIds={};
  $('toc-list').innerHTML=headings.map(h=>{
    const base=h.textContent.toLowerCase().replace(/\s+/g,'-').replace(/[^\w-]/g,'');
    let id=base;
    if(usedIds[base]){usedIds[base]++;id=`${base}-${usedIds[base]}`;}else{usedIds[base]=1;}
    h.id=id;
    return`<div class="toc-item ${h.tagName==='H3'?'toc-h2':''}" onclick="tocClick('${id}')">${escHtml(h.textContent)}</div>`;
  }).join('');
  if(location.hash){
    const target=document.getElementById(location.hash.slice(1));
    if(target) setTimeout(()=>target.scrollIntoView({behavior:'smooth'}),100);
  }
}

// ── Markdown toolbar formatting ──
// Use execCommand('insertText') so every toolbar action is a single undo step.
// setRangeText() bypasses the browser's input pipeline and breaks Ctrl+Z on
// many browsers; execCommand preserves the native undo/redo stack.
function taInsert(ta,text,start,end){
  ta.focus();
  ta.setSelectionRange(start,end);
  if(!document.execCommand('insertText',false,text)){
    // Fallback for environments where execCommand is unavailable
    ta.setRangeText(text,start,end,'end');
  }
}

function fmt(before,after,placeholder){
  const ta=$('editor');
  const s=ta.selectionStart,e=ta.selectionEnd;
  const hasSel=s!==e;
  const sel=hasSel?ta.value.slice(s,e):placeholder;
  const ins=before+sel+after;
  taInsert(ta,ins,s,e);
  if(!hasSel&&placeholder){
    ta.selectionStart=s+before.length;
    ta.selectionEnd=s+before.length+placeholder.length;
  }
  ta.dispatchEvent(new Event('input'));
}

function fmtLine(prefix){
  const ta=$('editor');
  const s=ta.selectionStart;
  const lineStart=ta.value.lastIndexOf('\n',s-1)+1;
  const lineEnd=ta.value.indexOf('\n',s);
  const end=lineEnd===-1?ta.value.length:lineEnd;
  const line=ta.value.slice(lineStart,end);
  const newLine=line.startsWith(prefix)?line.slice(prefix.length):prefix+line;
  taInsert(ta,newLine,lineStart,end);
  ta.dispatchEvent(new Event('input'));
}

function fmtTable(){
  const tmpl='\n| Column 1 | Column 2 |\n| --- | --- |\n| Cell | Cell |\n';
  fmt(tmpl,'','');
}

// For referencing an already-uploaded (or external) video by URL — drag-drop
// in initDragDrop() inserts the same <video> tag automatically on upload.
function fmtVideo(){
  fmt('\n<video controls src="','"></video>\n','url');
}

// ── Drag-and-drop image upload ──
// Small size-choice prompt shown right after an image drop, before anything
// is inserted — asked up front (not after upload) so declining doesn't leave
// an uploaded-but-unreferenced file behind. "Маленькое" caps width, doesn't
// upscale a smaller image — hence max-width, not a fixed width attribute.
function chooseImageSize(fileName){
  return new Promise(resolve=>{
    $('modal-title').textContent='Размер изображения';
    $('modal-body').innerHTML=`<p style="font-size:12px;color:var(--text2)">${escHtml(fileName)}</p>`;
    const actions=$('modal-actions');
    actions.innerHTML='';
    const small=document.createElement('button');
    small.textContent='Маленькое (до 400px)';
    small.onclick=()=>{closeModal();resolve('small');};
    const full=document.createElement('button');
    full.className='btn-primary';
    full.textContent='1:1 (оригинал)';
    full.onclick=()=>{closeModal();resolve('full');};
    actions.appendChild(small);
    actions.appendChild(full);
    $('modal-overlay').classList.add('open');
  });
}

function initDragDrop(){
  if(dragDropInit) return;
  dragDropInit=true;
  const wrap=$('editor-wrap');
  wrap.addEventListener('dragover',e=>{
    e.preventDefault();
    wrap.classList.add('drag-over');
  });
  wrap.addEventListener('dragleave',e=>{
    if(!wrap.contains(e.relatedTarget)) wrap.classList.remove('drag-over');
  });
  wrap.addEventListener('drop',async e=>{
    e.preventDefault();
    wrap.classList.remove('drag-over');
    const files=[...e.dataTransfer.files].filter(f=>
      f.type.startsWith('image/')||f.type.startsWith('video/')||f.type==='application/pdf');
    if(!files.length) return;
    const ok=await requireUnlock();
    if(!ok) return;
    for(const file of files){
      const isVideo=file.type.startsWith('video/');
      const isPdf=file.type==='application/pdf';
      const kind=isVideo?'video':isPdf?'pdf':'image';
      try{
        let size=null;
        if(kind==='image') size=await chooseImageSize(file.name);
        const ts=Date.now();
        const safeName=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
        const uploadPath=`docs/assets/${ts}-${safeName}`;
        await apiUploadFile(uploadPath,`docs: upload ${kind} ${safeName}`,file);
        const url='/'+uploadPath;
        const ta=$('editor');
        const pos=ta.selectionStart;
        // marked.js passes raw HTML through as-is (see PROJECT_ARCHITECTURE.md
        // — no DOMPurify, accepted for an internal wiki), so <video>/<img
        // style=...> render as-is without any renderer changes. Markdown
        // image syntax has no attribute syntax, hence raw <img> for "small".
        let ins;
        if(isVideo) ins=`\n<video controls src="${url}"></video>\n`;
        else if(isPdf) ins=`[${safeName}](${url})`;
        else if(size==='small') ins=`<img src="${url}" alt="${safeName}" style="max-width:400px;height:auto">`;
        else ins=`![${safeName}](${url})`;
        taInsert(ta,ins,pos,pos);
        ta.dispatchEvent(new Event('input'));
        toast(isVideo?'Видео загружено':isPdf?'Файл загружен':t('image_uploaded'));
      }catch(err){toast(`Upload failed: ${err.message}`,true);}
    }
  });
}

async function startEdit(){
  $('btn-edit').disabled=true;
  // canEditPage (not just canEdit) — lets page-level editors[] in, matching
  // the edit button's own visibility rule in openPage().
  const _rel=currentPath?currentPath.replace('docs/','').replace(/\.md$/,''):null;
  const _page=tree.find(p=>p.path===_rel);
  if(!canEditPage(_page)){
    toast('Нет прав на редактирование');
    $('btn-edit').disabled=false;
    return;
  }
  try{
  const md=await fetchDoc(currentPath);
  originalContent=md;
  editorDirty=false;
  $('editor').value=md;
  const draft=loadDraft(currentPath);
  if(draft&&draft.content!==originalContent) showDraftBanner();
  else hideDraftBanner();
  _activateEditorPanel(); // btn-edit is hidden inside here, so no need to re-enable
  }catch(e){$('btn-edit').disabled=false;toast(`${t('error_load')}: ${escHtml(e.message)}`,true);}
}

function cancelEdit(){
  if(originalContent!==null){renderView(originalContent);originalContent=null;}
  editorDirty=false;
  hideDraftBanner();
  hideWikiComplete();
  $('panels').classList.remove('split');
  $('editor-wrap').style.display='none';
  $('editor-wrap').classList.remove('edit-active');
  $('edit-btns').style.display='none';
  $('view-wrap').style.display=currentPath?'block':'none';
  const _ce=canEdit()&&!!currentPath;
  // startEdit() disables btn-edit while its fetch is in flight and only
  // re-enables it on error — on the success path nothing ever did, so after
  // one successful edit the button stayed permanently unclickable. cancelEdit()
  // runs on every exit from edit mode (including after a successful save) and
  // on every openPage(), so resetting it here covers every case.
  $('btn-edit').disabled=false;
  $('btn-edit').style.display=_ce?'flex':'none';
  $('btn-visibility').style.display=_ce?'flex':'none';
  $('btn-fav').style.display=currentPath?'flex':'none';
  $('btn-share').style.display=currentPath?'flex':'none';
  $('btn-print').style.display=currentPath?'flex':'none';
  $('btn-delete').style.display=_ce?'flex':'none';
  $('btn-rename').style.display=_ce?'flex':'none';
  $('btn-history').style.display=_ce?'flex':'none';
  const _curRel=currentPath?currentPath.replace('docs/','').replace(/\.md$/,''):null;
  $('btn-append').style.display=(FULL_ACCESS_ROLES.includes(currentRole?.slug)&&_curRel&&['glossary/index','incidents/index'].includes(_curRel))?'flex':'none';
  buildToc();
}

async function savePage(){

}

// ── Transliteration helper ────────────────────────────────────────────────────
const _CYR={'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'zh','з':'z','и':'i','й':'j','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f','х':'kh','ц':'ts','ч':'ch','ш':'sh','щ':'shch','ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya'};
function titleToSlug(s){
  return(s||'').toLowerCase().split('').map(c=>_CYR[c]!==undefined?_CYR[c]:c).join('')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,60);
}

async function importDocx(contextPath){
  const ok=await requireUnlock();
  if(!ok) return;
  const title=($('m-doc-title')||{}).value?.trim();
  const slug=($('m-doc-slug')||{}).value?.trim()||titleToSlug(title);
  const fileEl=$('m-docx-file');
  const file=fileEl&&fileEl.files[0];
  if(!title){toast('Введите название документа',true);return;}
  if(!slug||!/^[a-z0-9][a-z0-9\-]*$/.test(slug)){toast('Имя файла: строчные латиница, цифры и дефисы',true);return;}
  if(!file){toast('Выберите .docx файл',true);return;}
  const btn=$('modal-actions').querySelector('.btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Конвертируется…';}
  try{
    const fd=new FormData();
    fd.append('file',file);
    const r=await fetch('/api/write/convert_docx',{method:'POST',body:fd,credentials:'same-origin'});
    if(!r.ok){let msg=r.statusText;try{const e=await r.json();msg=e.error||msg;}catch{}throw new Error(msg);}
    const res=await r.json();
    const relPath=contextPath?`${contextPath}/${slug}`:slug;
    const fullPath=`docs/${relPath}.md`;
    const content=`---\ntitle: ${title}\nisCounting: true\n---\n# ${title}\n\n`+res.markdown;
    closeModal();
    currentPath=fullPath;
    originalContent='';
    editorDirty=true;
    $('editor').value=content;
    $('editor').dispatchEvent(new Event('input'));
    _activateEditorPanel();
    const n=res.images?res.images.length:0;
    toast(n?`Конвертировано, изображений: ${n} — проверьте и сохраните`:'Конвертировано — проверьте и сохраните');
  }catch(e){
    toast(`Ошибка: ${e.message}`,true);
    if(btn){btn.disabled=false;btn.textContent='Импортировать';}
  }
}

// ── Edit-tree mode: toggle, apply/cancel, drag-and-drop reorder ──
// First click enters edit mode (rename/delete buttons + drag handles show
// on every folder/page row). Second click applies every accumulated drag
// as ONE batched /api/write/reorder call/commit — nothing hits the network
// while dragging, only pendingReorders (client-side Map) changes.
async function toggleEditTreeMode(){
  if(!editTreeMode){
    editTreeMode=true;
    pendingReorders=new Map();
    renderTree(tree);
    return;
  }
  editTreeMode=false;
  if(pendingReorders.size===0){renderTree(tree);return;}
  const folders=[...pendingReorders.entries()].map(([path,pages])=>({path,pages}));
  try{
    await apiReorder(folders,'docs: reorder tree');
    await loadTree();
    toast(t('saved'));
  }catch(e){
    toast(`Error: ${e.message}`,true);
    renderTree(tree);
  }
}

function cancelEditTreeMode(){
  editTreeMode=false;
  pendingReorders=new Map();
  renderTree(tree);
}

// makeSortable — native HTML5 drag-and-drop (draggable/dragstart/dragover/
// drop), no library, consistent with the rest of this codebase. container's
// direct children must all be homogeneous drag items (either all .tree-row
// or all .tree-folder-item — see renderTree's pagesWrap/subfoldersWrap
// split). onDrop is called once the DOM order settles, to recompute and
// stash the new order in pendingReorders — never called during dragover,
// only on an actual drop.
function makeSortable(container,onDrop){
  let dragEl=null;
  // Bind per direct-child item, not a blind querySelectorAll(container) —
  // a .tree-folder-item's handle sits inside its own header, but that same
  // item also contains a NESTED sortable group (its own pages/subfolders)
  // with its own handles further down; item.querySelector (single match,
  // document order) always lands on the item's own header handle first,
  // since the header precedes its nested content — never the nested ones.
  [...container.children].forEach(item=>{
    const handle=item.querySelector('[draggable="true"]');
    if(!handle) return;
    handle.addEventListener('dragstart',e=>{
      dragEl=item;
      e.dataTransfer.effectAllowed='move';
      item.classList.add('dragging');
    });
    handle.addEventListener('dragend',()=>{
      item.classList.remove('dragging');
      dragEl=null;
    });
  });
  container.addEventListener('dragover',e=>{
    if(!dragEl||dragEl.parentElement!==container)return;
    e.preventDefault();
    const siblings=[...container.children].filter(c=>c!==dragEl);
    const after=siblings.find(c=>{
      const r=c.getBoundingClientRect();
      return e.clientY<r.top+r.height/2;
    });
    container.insertBefore(dragEl,after||null);
  });
  container.addEventListener('drop',e=>{
    if(!dragEl||dragEl.parentElement!==container)return;
    e.preventDefault();
    onDrop();
  });
}
